const TwoCol = ({ left, right, ratio = "1fr 1fr" }) => {
  // Parse ratio to get relative sizing hints
  const parts = ratio.split(/\s+/);
  const parseW = (s) => {
    if (s.endsWith("px")) return { flex: `0 1 ${s}`, minWidth: "0" };
    if (s === "1fr") return { flex: "1 1 260px", minWidth: "0" };
    return { flex: "1 1 260px", minWidth: "0" };
  };
  const ls = parseW(parts[0] || "1fr");
  const rs = parseW(parts[1] || "1fr");
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: "20px" }}>
      <div style={ls}>{left}</div>
      <div style={rs}>{right}</div>
    </div>
  );
};

// ============================================================
// LANDED COST CALCULATOR
// ============================================================
const LandedCostCalc = ({ settings = DEFAULT_SETTINGS, products = PRODUCT_DATABASE }) => {
  const [productId, setProductId] = useState("");
  const [countryId, setCountryId] = useState("us");
  const [fobJPY, setFobJPY] = useState("");
  const [qty, setQty] = useState("");
  const [shipping, setShipping] = useState("sea");
  const [retailPrice, setRetailPrice] = useState("");

  const product = products.find((p) => p.id === productId);
  const country = COUNTRIES.find((c) => c.id === countryId);
  const tariff = product && country ? country.tariffs[product.hsCode] : null;

  const calc = useMemo(() => {
    if (!fobJPY || !qty || !tariff || !country) return null;
    const fobUnit = parseFloat(fobJPY);
    const units = parseInt(qty);
    const fxKey = country.currency === "EUR" ? "eur" : country.currency === "GBP" ? "gbp" : "usd";
    const rate = settings.fx[fxKey] || country.exchangeRate || 150;
    const fobUSD = fobUnit / rate;
    const fobTotal = fobUSD * units;
    const freightPerUnit = shipping === "sea" ? settings.freight.seaPerUnit : settings.freight.airPerUnit;
    const freightTotal = freightPerUnit * units;
    const insuranceRate = settings.insurance / 100;
    const insurance = fobTotal * insuranceRate;
    const cifTotal = fobTotal + freightTotal + insurance;
    let dutyRate = 0;
    if (countryId === "us") { dutyRate = (tariff.mfnNum || 0) + (country.section122?.rateNum || 0); }
    else { dutyRate = tariff.ftaNum ?? tariff.mfnNum ?? 0; }
    const dutyAmount = cifTotal * (dutyRate / 100);
    const brokerFee = settings.brokerFee[countryId] || country.customsBrokerFee || 200;
    const mpf = countryId === "us" ? Math.min(Math.max(cifTotal * (settings.mpfRate / 100), settings.mpfMin), settings.mpfMax) : 0;
    const hmf = countryId === "us" && shipping === "sea" ? cifTotal * (settings.hmfRate / 100) : 0;
    const totalLanded = cifTotal + dutyAmount + brokerFee + mpf + hmf;
    const landedPerUnit = totalLanded / units;
    const retail = retailPrice ? parseFloat(retailPrice) : null;
    const margin = retail ? ((retail - landedPerUnit) / retail) * 100 : null;
    return { fobUSD, fobTotal, freightTotal, insurance, cifTotal, dutyRate, dutyAmount, brokerFee, mpf, hmf, totalLanded, landedPerUnit, margin, rate, units };
  }, [fobJPY, qty, tariff, country, countryId, shipping, retailPrice, settings]);

  return (
    <div>
      <SectionHeader sub="FOB → 着荷原価を自動試算。⚙️設定タブで運賃・為替を変更可能。">💵 Landed Cost 計算機</SectionHeader>
      <TwoCol ratio="380px 1fr"
        left={
          <Card>
            <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
              <div><Label>製品</Label><Select value={productId} onChange={setProductId} placeholder="選択..." options={products.map((p) => ({ value: p.id, label: p.name }))} /></div>
              <div><Label>仕向国</Label><CountryTabs selected={countryId} onSelect={setCountryId} /></div>
              <div style={{ display: "flex", gap: "10px" }}>
                <div style={{ flex: 1 }}><Label>FOB単価（円）</Label><Input value={fobJPY} onChange={setFobJPY} placeholder="例: 300" type="number" /></div>
                <div style={{ flex: 1 }}><Label>数量（個）</Label><Input value={qty} onChange={setQty} placeholder="例: 1000" type="number" /></div>
              </div>
              <div style={{ display: "flex", gap: "10px" }}>
                <div style={{ flex: 1 }}><Label>輸送方法</Label><Select value={shipping} onChange={setShipping} options={[{ value: "sea", label: "🚢 海上" }, { value: "air", label: "✈️ 航空" }]} /></div>
                <div style={{ flex: 1 }}><Label>想定小売価格（USD等）</Label><Input value={retailPrice} onChange={setRetailPrice} placeholder="例: 4.99" type="number" /></div>
              </div>
            </div>
          </Card>
        }
        right={calc ? (
          <div>
            <Card style={{ background: "#FAFAF5" }}>
              <Label>📊 コスト内訳（為替: ¥{calc.rate}/{country.currency}）</Label>
              <div style={{ fontSize: "14px", lineHeight: 2.2 }}>
                {[
                  ["FOB単価", fmtUSD(calc.fobUSD) + `/個 × ${calc.units}個`, fmtUSD(calc.fobTotal)],
                  [`運賃（${shipping === "sea" ? "海上" : "航空"}）`, `${fmtUSD(shipping === "sea" ? settings.freight.seaPerUnit : settings.freight.airPerUnit)}/個`, fmtUSD(calc.freightTotal)],
                  [`保険料（${settings.insurance}%）`, "", fmtUSD(calc.insurance)],
                  ["CIF合計", "", fmtUSD(calc.cifTotal)],
                ].map(([l, d, v], i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", borderBottom: i === 3 ? "2px solid #333" : `1px solid ${C.border}`, paddingBottom: "2px" }}>
                    <span>{l} <span style={{ color: C.textMuted, fontSize: "12px" }}>{d}</span></span>
                    <span style={{ fontWeight: i === 3 ? 700 : 400, fontFamily: "monospace" }}>{v}</span>
                  </div>
                ))}
                <div style={{ marginTop: "6px" }}>
                  {[
                    [`関税（実効 ${calc.dutyRate.toFixed(1)}%）`, fmtUSD(calc.dutyAmount)],
                    ["通関手数料（Broker Fee）", fmtUSD(calc.brokerFee)],
                    ...(countryId === "us" ? [["MPF（Merchandise Processing Fee）", fmtUSD(calc.mpf)], ...(shipping === "sea" ? [["HMF（Harbor Maintenance Fee）", fmtUSD(calc.hmf)]] : [])] : []),
                  ].map(([l, v], i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", borderBottom: `1px solid ${C.border}`, paddingBottom: "2px" }}>
                      <span>{l}</span><span style={{ fontFamily: "monospace" }}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </Card>
            <Card style={{ background: C.amberLight, border: `1px solid ${C.amberBorder}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: "16px", fontWeight: 700 }}>
                <span>Landed Cost 合計</span><span>{fmtUSD(calc.totalLanded)}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: "22px", fontWeight: 800, color: C.amber, marginTop: "6px" }}>
                <span>単価（着地）</span><span>{fmtUSD(calc.landedPerUnit)} / 個</span>
              </div>
              <div style={{ fontSize: "13px", color: "#744210", marginTop: "4px" }}>
                FOB {fmtJPY(parseFloat(fobJPY))} → 着地 {fmtJPY(calc.landedPerUnit * calc.rate)}（{((calc.landedPerUnit / calc.fobUSD - 1) * 100).toFixed(1)}% 増）
              </div>
            </Card>
            {calc.margin !== null && (
              <Card style={{ background: calc.margin > 50 ? C.greenBg : calc.margin > 30 ? C.amberLight : "#FFF5F5", border: `1px solid ${calc.margin > 50 ? C.greenBorder : calc.margin > 30 ? C.amberBorder : "#FED7D7"}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: "18px", fontWeight: 700, color: calc.margin > 50 ? C.green : calc.margin > 30 ? "#744210" : C.red }}>
                  <span>粗利率</span><span>{calc.margin.toFixed(1)}%</span>
                </div>
                <div style={{ fontSize: "13px", color: C.textLight, marginTop: "2px" }}>
                  {calc.margin > 50 ? "✅ 健全" : calc.margin > 30 ? "🟡 許容範囲" : "🔴 要見直し"}
                  （小売 {fmtUSD(parseFloat(retailPrice))} − 着地 {fmtUSD(calc.landedPerUnit)} = 利益 {fmtUSD(parseFloat(retailPrice) - calc.landedPerUnit)}）
                </div>
              </Card>
            )}
          </div>
        ) : (
          <Card style={{ background: C.grayLight, textAlign: "center", padding: "60px 20px" }}>
            <div style={{ fontSize: "14px", color: C.textMuted }}>← 左のフォームに入力するとコスト内訳が表示されます</div>
          </Card>
        )}
      />
    </div>
  );
};

// ============================================================
const OriginDetermination = ({ products = PRODUCT_DATABASE }) => {
  const [productId, setProductId] = useState("");
  const product = products.find((p) => p.id === productId);

  const calcRVC = (materials) => {
    if (!materials) return null;
    const totalMaterialValue = materials.reduce((s, m) => s + m.value, 0);
    const fobEstimate = totalMaterialValue * 2.5;
    const nonOriginValue = materials.filter((m) => m.origin !== "JP").reduce((s, m) => s + m.value, 0);
    const rvc = ((fobEstimate - nonOriginValue) / fobEstimate) * 100;
    return { rvc, totalMaterialValue, fobEstimate, nonOriginValue };
  };

  const checkCTH = (materials, productHs) => {
    if (!materials) return null;
    const prodHead = productHs.substring(0, 4);
    const nonOrigin = materials.filter((m) => m.origin !== "JP");
    const allChanged = nonOrigin.every((m) => m.hsCode.substring(0, 4) !== prodHead);
    return { passed: allChanged, nonOrigin, prodHead };
  };

  const rvcResult = product ? calcRVC(product.materials) : null;
  const cthResult = product ? checkCTH(product.materials, product.hsCode) : null;

  return (
    <div>
      <SectionHeader sub="EPA/CPTPP/RCEPの原産地基準充足を自動判定">🌾 原産地判定ワークシート</SectionHeader>
      <div style={{ maxWidth: "400px", marginBottom: "16px" }}>
        <Select value={productId} onChange={setProductId} placeholder="製品を選択..." options={products.filter((p) => p.materials).map((p) => ({ value: p.id, label: p.name }))} />
      </div>
      {product && product.materials && (
        <TwoCol ratio="1fr 1fr"
          left={
            <div>
              <Card>
                <Label>📦 原材料構成（HS: {product.hsCode}）</Label>
                <div style={{ fontSize: "13px" }}>
                  {product.materials.map((m, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.border}` }}>
                      <span>{m.origin === "JP" ? "🇯🇵" : "🌐"} {m.name} ({m.hsCode})</span>
                      <span style={{ color: m.origin === "JP" ? C.green : C.red, fontWeight: 600 }}>{m.origin} — ¥{m.value}</span>
                    </div>
                  ))}
                </div>
              </Card>
              <Card>
                <Label>🔍 CTH判定（関税番号変更基準）</Label>
                {cthResult && (
                  <div>
                    <div style={{ fontSize: "13px", lineHeight: 1.7 }}>
                      製品HS上4桁: <strong>{cthResult.prodHead}</strong><br />
                      非原産材料: {cthResult.nonOrigin.length === 0 ? "なし（全て日本原産）" : cthResult.nonOrigin.map((m) => `${m.name}(${m.hsCode.substring(0, 4)})`).join(", ")}
                    </div>
                    <div style={{ marginTop: "8px", padding: "10px", borderRadius: "6px", background: cthResult.passed ? C.greenBg : "#FFF5F5", border: `1px solid ${cthResult.passed ? C.greenBorder : "#FED7D7"}` }}>
                      <span style={{ fontSize: "14px", fontWeight: 700, color: cthResult.passed ? C.green : C.red }}>{cthResult.passed ? "✅ CTH基準 充足" : "❌ CTH基準 不充足"}</span>
                    </div>
                  </div>
                )}
              </Card>
            </div>
          }
          right={
            <div>
              <Card>
                <Label>📊 RVC判定（付加価値基準）</Label>
                {rvcResult && (
                  <div>
                    <div style={{ fontSize: "13px", lineHeight: 2 }}>
                      FOB推定額: ¥{rvcResult.fobEstimate}<br />
                      非原産材料額: ¥{rvcResult.nonOriginValue}<br />
                      <strong>RVC = {rvcResult.rvc.toFixed(1)}%</strong>
                    </div>
                    <div style={{ marginTop: "10px" }}>
                      {Object.entries(ORIGIN_RULES).map(([key, rule]) => {
                        const passed = rvcResult.rvc >= rule.threshold;
                        return (
                          <div key={key} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 12px", marginBottom: "6px", borderRadius: "6px", background: passed ? C.greenBg : "#FFF5F5", border: `1px solid ${passed ? C.greenBorder : "#FED7D7"}` }}>
                            <span style={{ fontSize: "13px" }}>{rule.name}（{rule.threshold}%以上）</span>
                            <span style={{ fontSize: "13px", fontWeight: 700, color: passed ? C.green : C.red }}>{passed ? "✅ 充足" : "❌ 不足"}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </Card>
              <Card style={{ background: C.blueBg, border: `1px solid ${C.blueBorder}` }}>
                <Label>📋 総合判定</Label>
                <div style={{ fontSize: "13px", lineHeight: 2, color: C.blue }}>
                  {Object.entries(ORIGIN_RULES).map(([key, rule]) => {
                    const rvcPass = rvcResult && rvcResult.rvc >= rule.threshold;
                    const cthPass = cthResult?.passed;
                    const eligible = rvcPass || cthPass;
                    return <div key={key}>{eligible ? "✅" : "❌"} {rule.name}: {eligible ? "特恵税率適用可（" + (cthPass ? "CTH" : "RVC") + "基準充足）" : "特恵税率適用不可"}</div>;
                  })}
                </div>
              </Card>
            </div>
          }
        />
      )}
    </div>
  );
};

const ComplianceTimeline = () => {
  const [countryId, setCountryId] = useState("us");
  const [shipDate, setShipDate] = useState("");
  const [checked, setChecked] = useState({});

  const timeline = TIMELINES[countryId] || [];
  const catColors = { fda: "#E53935", broker: "#FF9800", label: "#9C27B0", qa: "#2196F3", doc: "#4CAF50", logistics: "#795548", ship: "#333", customs: "#607D8B", btom: "#00BCD4", fta: "#3F51B5" };

  const getDate = (dayOffset) => {
    if (!shipDate) return "—";
    const d = new Date(shipDate);
    d.setDate(d.getDate() + dayOffset);
    return d.toLocaleDateString("ja-JP", { month: "short", day: "numeric" });
  };

  const completedCount = Object.values(checked).filter(Boolean).length;
  const totalCount = timeline.length;
  const progress = totalCount ? (completedCount / totalCount) * 100 : 0;

  return (
    <div>
      <SectionHeader sub="出荷日から逆算でタスクを管理">⏱️ コンプライアンス・タイムライン</SectionHeader>
      <TwoCol ratio="320px 1fr"
        left={
          <div>
            <Card>
              <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
                <div><Label>仕向国</Label><CountryTabs selected={countryId} onSelect={(id) => { setCountryId(id); setChecked({}); }} /></div>
                <div><Label>出荷予定日</Label><Input value={shipDate} onChange={setShipDate} type="date" /></div>
              </div>
            </Card>
            {shipDate && (
              <Card style={{ background: C.amberLight, border: `1px solid ${C.amberBorder}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
                  <span style={{ fontSize: "14px", fontWeight: 700 }}>進捗: {completedCount}/{totalCount}</span>
                  <span style={{ fontSize: "13px", color: "#744210" }}>{progress.toFixed(0)}%</span>
                </div>
                <div style={{ height: "8px", background: "#FDE68A", borderRadius: "4px", overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${progress}%`, background: C.amber, borderRadius: "4px", transition: "width 0.3s" }} />
                </div>
              </Card>
            )}
          </div>
        }
        right={shipDate ? (
          <Card style={{ padding: "16px" }}>
            {timeline.map((item, i) => {
              const key = `${countryId}-${i}`;
              const isShip = item.category === "ship";
              return (
                <div key={i} style={{ display: "flex", gap: "12px", marginBottom: "2px" }}>
                  <div style={{ width: "60px", textAlign: "right", paddingTop: "12px", flexShrink: 0 }}>
                    <div style={{ fontSize: "12px", color: C.textLight, fontWeight: 600 }}>{getDate(item.day)}</div>
                    <div style={{ fontSize: "11px", color: C.textMuted }}>{item.day === 0 ? "出荷日" : `${Math.abs(item.day)}日${item.day < 0 ? "前" : "後"}`}</div>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: "18px" }}>
                    <div style={{ width: "2px", flex: 1, background: i === 0 ? "transparent" : C.border }} />
                    <div style={{ width: isShip ? "16px" : "12px", height: isShip ? "16px" : "12px", borderRadius: "50%", background: checked[key] ? C.green : (catColors[item.category] || C.gray), border: "2px solid #fff", boxShadow: `0 0 0 1px ${C.border}`, flexShrink: 0 }} />
                    <div style={{ width: "2px", flex: 1, background: i === timeline.length - 1 ? "transparent" : C.border }} />
                  </div>
                  <div style={{ flex: 1, padding: "8px 14px", background: isShip ? "#1A1814" : checked[key] ? C.greenBg : C.white, border: `1px solid ${isShip ? "#333" : checked[key] ? C.greenBorder : C.border}`, borderRadius: "8px", marginBottom: "4px", cursor: isShip ? "default" : "pointer", opacity: checked[key] ? 0.7 : 1, transition: "all 0.15s" }}
                    onClick={() => !isShip && setChecked((c) => ({ ...c, [key]: !c[key] }))}
                  >
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: "13px", fontWeight: 600, color: isShip ? "#fff" : C.text, textDecoration: checked[key] ? "line-through" : "none" }}>{item.task}</span>
                      {!isShip && <span style={{ fontSize: "16px" }}>{checked[key] ? "✅" : "☐"}</span>}
                    </div>
                    {item.tip && <div style={{ fontSize: "12px", color: isShip ? "#999" : C.textLight, marginTop: "3px", lineHeight: 1.5 }}>{item.tip}</div>}
                  </div>
                </div>
              );
            })}
          </Card>
        ) : (
          <Card style={{ background: C.grayLight, textAlign: "center", padding: "60px 20px" }}>
            <div style={{ fontSize: "14px", color: C.textMuted }}>← 出荷予定日を設定するとタイムラインが表示されます</div>
          </Card>
        )}
      />
    </div>
  );
};

// ============================================================
const SettingsPanel = ({ settings, onUpdate, apiKey = "", onApiKeyChange }) => {
  const [pdfStatus, setPdfStatus] = useState(null);
  const [pdfParsed, setPdfParsed] = useState(null);
  const [pdfError, setPdfError] = useState(null);
  const [containerQty, setContainerQty] = useState("");
  const u = (path, val) => {
    const s = JSON.parse(JSON.stringify(settings));
    const keys = path.split(".");
    let obj = s;
    for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
    obj[keys[keys.length - 1]] = parseFloat(val) || 0;
    onUpdate(s);
  };
  const SettingRow = ({ label, path, unit }) => (
    <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "8px" }}>
      <div style={{ flex: 1, fontSize: "14px", color: C.text }}>{label}</div>
      <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
        <input type="number" value={settings[path.split(".")[0]]?.[path.split(".")[1]] ?? path.split(".").reduce((o, k) => o?.[k], settings) ?? ""} onChange={(e) => u(path, e.target.value)} style={{ width: "100px", padding: "8px 10px", border: `1px solid ${C.border}`, borderRadius: "6px", fontSize: "14px", textAlign: "right", fontFamily: "monospace", color: C.text }} />
        {unit && <span style={{ fontSize: "13px", color: C.textLight, minWidth: "30px" }}>{unit}</span>}
      </div>
    </div>
  );
  const SGroup = ({ title, children }) => (
    <div style={{ marginBottom: "20px" }}>
      <div style={{ fontSize: "14px", fontWeight: 700, color: "#744210", marginBottom: "10px", paddingBottom: "6px", borderBottom: `1px solid ${C.amberBorder}` }}>{title}</div>
      {children}
    </div>
  );

  const handlePdfUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setPdfStatus("reading");
    setPdfParsed(null);
    setPdfError(null);
    try {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej(new Error("ファイル読み込み失敗"));
        r.readAsDataURL(file);
      });
      setPdfStatus("parsing");
      const mimeType = file.type || "application/pdf";
      if (!apiKey) { setPdfStatus("nokey"); return; }
      const sysPrompt = `You extract freight/logistics cost data from shipping quotes and invoices. Return ONLY valid JSON (no markdown, no backticks, no preamble). Extract whatever you can find. Use this exact schema:
{"sea_per_unit":null,"sea_container_total":null,"air_per_unit":null,"air_container_total":null,"insurance_pct":null,"broker_fee_usd":null,"fx_usd":null,"fx_eur":null,"fx_gbp":null,"notes":"brief description of what was found"}
CRITICAL RULES:
- sea_per_unit / air_per_unit: freight cost per INDIVIDUAL PRODUCT UNIT only. Set to null if not explicitly stated per unit.
- sea_container_total / air_container_total: total freight for the entire container/shipment (e.g. "$6,000 for 20ft FCL"). Extract this when a container rate is given.
- If both total freight AND quantity of individual units are present, also calculate and set sea_per_unit = total/qty.
- broker_fee_usd: total customs broker fee in USD (Entry Fee + ISF + FDA filing etc. combined).
- All monetary values in USD. Insurance as percentage (e.g. 0.5 for 0.5%). Use null for values not found.`;
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: sysPrompt }] },
          contents: [{ parts: [{ inlineData: { mimeType, data: base64 } }, { text: "この見積書/請求書から輸送コスト・為替レート等のデータを抽出してJSON形式で返してください。" }] }],
        }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        const errMsg = data.error?.message || `APIエラー (HTTP ${resp.status})`;
        setPdfError(errMsg);
        setPdfStatus("error");
        return;
      }
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      if (!text) {
        setPdfError("AIからの応答が空でした。ファイルの内容を確認してください。");
        setPdfStatus("error");
        return;
      }
      const cleaned = text.replace(/```json\n?|```/g, "").trim();
      let parsed;
      try {
        parsed = JSON.parse(cleaned);
      } catch (parseErr) {
        setPdfError(`JSON解析エラー: ${cleaned.substring(0, 100)}`);
        setPdfStatus("error");
        return;
      }
      setPdfParsed(parsed);
      setPdfStatus("done");
    } catch (err) {
      console.error(err);
      setPdfError(err.message || "ネットワークエラーが発生しました。");
      setPdfStatus("error");
    }
  };

  const applyParsed = () => {
    if (!pdfParsed) return;
    const s = JSON.parse(JSON.stringify(settings));
    const qty = parseFloat(containerQty) || 0;
    // 1個あたり海上運賃: 明示されていればそれを使用、なければコンテナ合計÷個数
    if (pdfParsed.sea_per_unit != null) {
      s.freight.seaPerUnit = pdfParsed.sea_per_unit;
    } else if (pdfParsed.sea_container_total != null && qty > 0) {
      s.freight.seaPerUnit = Math.round((pdfParsed.sea_container_total / qty) * 100) / 100;
    }
    // 1個あたり航空運賃
    if (pdfParsed.air_per_unit != null) {
      s.freight.airPerUnit = pdfParsed.air_per_unit;
    } else if (pdfParsed.air_container_total != null && qty > 0) {
      s.freight.airPerUnit = Math.round((pdfParsed.air_container_total / qty) * 100) / 100;
    }
    if (pdfParsed.insurance_pct != null) s.insurance = pdfParsed.insurance_pct;
    if (pdfParsed.broker_fee_usd != null) s.brokerFee.us = pdfParsed.broker_fee_usd;
    if (pdfParsed.fx_usd != null) s.fx.usd = pdfParsed.fx_usd;
    if (pdfParsed.fx_eur != null) s.fx.eur = pdfParsed.fx_eur;
    if (pdfParsed.fx_gbp != null) s.fx.gbp = pdfParsed.fx_gbp;
    onUpdate(s);
    setPdfParsed(null);
    setContainerQty("");
    setPdfStatus("applied");
  };

  return (
    <div>
      <SectionHeader sub="為替レート・輸送コスト・手数料をカスタマイズ。💵コスト / 📄書類タブに反映。">⚙️ コスト設定</SectionHeader>
      <TwoCol ratio="1fr 1fr"
        left={
          <div>
            <Card style={{ border: `2px dashed ${C.amberBorder}`, background: C.amberLight }}>
              <div style={{ fontSize: "14px", fontWeight: 700, marginBottom: "8px", color: "#744210" }}>📎 見積書から自動読み込み</div>
              <div style={{ fontSize: "13px", color: "#744210", marginBottom: "12px", lineHeight: 1.6 }}>フォワーダーの見積書PDF（または画像）をアップロードすると、AIが運賃・保険・手数料等を自動抽出します。</div>
              <label style={{ display: "inline-flex", alignItems: "center", gap: "8px", padding: "10px 20px", background: "#fff", border: `1.5px solid ${C.amberBorder}`, borderRadius: "8px", cursor: "pointer", fontSize: "13px", fontWeight: 600, color: "#744210" }}>
                📄 ファイルを選択
                <input type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" onChange={handlePdfUpload} style={{ display: "none" }} />
              </label>
              <div style={{ fontSize: "12px", color: C.textMuted, marginTop: "6px" }}>PDF / PNG / JPG に対応</div>
              {pdfStatus === "reading" && <div style={{ fontSize: "13px", color: C.amber, marginTop: "8px" }}>📄 ファイル読み込み中...</div>}
              {pdfStatus === "parsing" && <div style={{ fontSize: "13px", color: C.amber, marginTop: "8px" }}>🤖 AI解析中...（10〜30秒）</div>}
              {pdfStatus === "error" && <div style={{ fontSize: "13px", color: C.red, marginTop: "8px" }}>❌ 読み取り失敗。{pdfError && <span style={{ display: "block", fontSize: "11px", marginTop: "4px", wordBreak: "break-all" }}>{pdfError}</span>}</div>}
              {pdfStatus === "nokey" && <div style={{ fontSize: "13px", color: C.red, marginTop: "8px" }}>🔑 APIキーが未設定です。下の「🔑 API設定」セクションにGemini APIキーを入力してください。</div>}
              {pdfStatus === "applied" && <div style={{ fontSize: "13px", color: C.green, marginTop: "8px" }}>✅ 設定に反映しました</div>}
              {pdfParsed && pdfStatus === "done" && (
                <div style={{ marginTop: "12px", padding: "14px", background: C.white, borderRadius: "8px", border: `1px solid ${C.border}` }}>
                  <div style={{ fontSize: "13px", fontWeight: 700, marginBottom: "8px" }}>🔍 抽出結果：</div>
                  <div style={{ fontSize: "13px", lineHeight: 2, fontFamily: "monospace" }}>
                    {pdfParsed.sea_per_unit != null && <div>海上運賃/個: <strong>${pdfParsed.sea_per_unit}</strong></div>}
                    {pdfParsed.sea_container_total != null && (
                      <div>
                        <div>海上運賃（コンテナ合計）: <strong>${pdfParsed.sea_container_total}</strong></div>
                        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginTop: "4px" }}>
                          <span style={{ color: C.textLight }}>出荷個数:</span>
                          <input
                            type="number" min="1" placeholder="例: 2000"
                            value={containerQty}
                            onChange={e => setContainerQty(e.target.value)}
                            style={{ width: "100px", padding: "4px 8px", border: `1px solid ${C.border}`, borderRadius: "4px", fontSize: "13px", fontFamily: "monospace" }}
                          />
                          <span style={{ color: C.textLight }}>個</span>
                          {containerQty && parseFloat(containerQty) > 0 && (
                            <span style={{ color: C.green, fontWeight: 700 }}>
                              → ${ (Math.round(pdfParsed.sea_container_total / parseFloat(containerQty) * 100) / 100) }/個
                            </span>
                          )}
                        </div>
                      </div>
                    )}
                    {pdfParsed.air_per_unit != null && <div>航空運賃/個: <strong>${pdfParsed.air_per_unit}</strong></div>}
                    {pdfParsed.air_container_total != null && <div>航空運賃（合計）: <strong>${pdfParsed.air_container_total}</strong></div>}
                    {pdfParsed.insurance_pct != null && <div>保険料率: <strong>{pdfParsed.insurance_pct}%</strong></div>}
                    {pdfParsed.broker_fee_usd != null && <div>通関手数料: <strong>${pdfParsed.broker_fee_usd}</strong></div>}
                    {pdfParsed.fx_usd != null && <div>USD/JPY: <strong>¥{pdfParsed.fx_usd}</strong></div>}
                    {pdfParsed.fx_eur != null && <div>EUR/JPY: <strong>¥{pdfParsed.fx_eur}</strong></div>}
                    {pdfParsed.fx_gbp != null && <div>GBP/JPY: <strong>¥{pdfParsed.fx_gbp}</strong></div>}
                    {pdfParsed.notes && <div style={{ color: C.textLight, fontFamily: font, marginTop: "4px" }}>💡 {pdfParsed.notes}</div>}
                  </div>
                  <div style={{ display: "flex", gap: "10px", marginTop: "10px" }}>
                    <Btn primary small onClick={applyParsed}
                      disabled={pdfParsed.sea_container_total != null && pdfParsed.sea_per_unit == null && !(parseFloat(containerQty) > 0)}
                    >✅ 設定に反映</Btn>
                    <Btn small onClick={() => { setPdfParsed(null); setPdfStatus(null); setContainerQty(""); }}>キャンセル</Btn>
                  </div>
                  {pdfParsed.sea_container_total != null && pdfParsed.sea_per_unit == null && !(parseFloat(containerQty) > 0) && (
                    <div style={{ fontSize: "12px", color: C.amber, marginTop: "6px" }}>⚠️ 出荷個数を入力すると1個あたり運賃を計算して反映します</div>
                  )}
                </div>
              )}
            </Card>
          </div>
        }
        right={
          <Card>
            <SGroup title="💱 為替レート（1通貨あたり円）">
              <SettingRow label="USD/JPY" path="fx.usd" unit="円" />
              <SettingRow label="EUR/JPY" path="fx.eur" unit="円" />
              <SettingRow label="GBP/JPY" path="fx.gbp" unit="円" />
            </SGroup>
            <SGroup title="🚢 輸送コスト（1個あたりUSD）">
              <SettingRow label="海上運賃" path="freight.seaPerUnit" unit="USD" />
              <SettingRow label="航空運賃" path="freight.airPerUnit" unit="USD" />
            </SGroup>
            <SGroup title="📋 保険・手数料">
              <SettingRow label="保険料率" path="insurance" unit="%" />
              <SettingRow label="Broker手数料（US）" path="brokerFee.us" unit="USD" />
              <SettingRow label="Broker手数料（EU）" path="brokerFee.eu" unit="USD" />
              <SettingRow label="Broker手数料（UK）" path="brokerFee.uk" unit="USD" />
            </SGroup>
            <SGroup title="🇺🇸 米国固有手数料">
              <SettingRow label="MPF率" path="mpfRate" unit="%" />
              <SettingRow label="MPF下限" path="mpfMin" unit="USD" />
              <SettingRow label="MPF上限" path="mpfMax" unit="USD" />
              <SettingRow label="HMF率（海上のみ）" path="hmfRate" unit="%" />
            </SGroup>
            <div style={{ textAlign: "right" }}>
              <Btn small onClick={() => onUpdate(JSON.parse(JSON.stringify(DEFAULT_SETTINGS)))} style={{ color: C.textMuted, fontSize: "12px" }}>🔄 初期値に戻す</Btn>
            </div>
          </Card>
        }
      />
      <Card style={{ marginTop: "8px" }}>
        <div style={{ fontSize: "14px", fontWeight: 700, color: "#744210", marginBottom: "10px", paddingBottom: "6px", borderBottom: `1px solid ${C.amberBorder}` }}>🔑 API設定（AI機能用）</div>
        <div style={{ fontSize: "13px", color: C.textLight, marginBottom: "10px", lineHeight: 1.6 }}>
          見積書PDF自動読み込み・スペックシート自動入力などのAI機能を使うにはGemini APIキーが必要です。キーはブラウザのメモリにのみ保持され、外部に送信されません（Google Gemini API以外）。
        </div>
        <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
          <input type="password" value={apiKey} onChange={e => onApiKeyChange?.(e.target.value)} placeholder="AIza..." style={{ flex: 1, padding: "10px 14px", border: `1px solid ${C.border}`, borderRadius: "8px", fontSize: "13px", fontFamily: "monospace", background: C.white }} />
          {apiKey && <span style={{ fontSize: "13px", color: C.green, fontWeight: 600 }}>✅ 設定済み</span>}
        </div>

const ProductCard = ({ product, expanded, onToggle, onSelectCountry }) => {
  const [showAlts, setShowAlts] = useState(false);
  const lk = { high: { color: C.red, bg: "#FFF5F5", label: "高" }, mid: { color: C.amber, bg: C.amberLight, label: "中" }, low: { color: C.gray, bg: C.grayLight, label: "低" } };
  return (
    <div style={{ border: expanded ? `2px solid ${C.amber}` : `1px solid ${C.border}`, borderRadius: "10px", overflow: "hidden", background: C.white, marginBottom: "10px", boxShadow: expanded ? "0 2px 8px rgba(0,0,0,0.06)" : "none" }}>
      <div onClick={onToggle} style={{ padding: "14px 18px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: "15px", fontWeight: 700, color: C.text }}>{product.name}</div>
          <div style={{ fontSize: "13px", color: C.textLight }}>{product.nameEn}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontFamily: "monospace", fontWeight: 700, fontSize: "16px", color: C.amber }}>{product.hsCode}</div>
          <div style={{ fontSize: "11px", color: C.textMuted }}>HTS: {product.htsUs}</div>
        </div>
      </div>
      {expanded && (
        <div style={{ padding: "0 18px 14px", borderTop: `1px solid ${C.border}` }}>
          <div style={{ fontSize: "13px", color: C.textLight, lineHeight: 1.6, margin: "10px 0" }}>{product.description}</div>
          {product.notes && <Tip>{product.notes}</Tip>}
          {product.factors?.length > 0 && (
            <div style={{ marginTop: "8px" }}>
              <div style={{ fontSize: "12px", fontWeight: 700, color: C.textLight, marginBottom: "4px" }}>分類に影響する要素:</div>
              <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>{product.factors.map((f, i) => <Pill key={i} color={C.blue} bg={C.blueBg} border={C.blueBorder}>{f}</Pill>)}</div>
            </div>
          )}
          {product.alternatives?.length > 0 && (
            <div style={{ marginTop: "10px" }}>
              <button onClick={(e) => { e.stopPropagation(); setShowAlts(!showAlts); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "13px", color: C.amber, fontWeight: 600 }}>{showAlts ? "▲ 代替分類を閉じる" : "▼ 代替分類を見る"}</button>
              {showAlts && product.alternatives.map((alt, i) => {
                const s = lk[alt.likelihood] || lk.low;
                return (
                  <div key={i} style={{ padding: "8px 12px", border: `1px solid ${C.border}`, borderRadius: "6px", marginTop: "6px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontFamily: "monospace", fontWeight: 700, fontSize: "14px" }}>{alt.hsCode}</span>
                      <Pill color={s.color} bg={s.bg} border="transparent">可能性: {s.label}</Pill>
                    </div>
                    <div style={{ fontSize: "12px", color: C.textLight, marginTop: "2px" }}>{alt.name} — {alt.condition}</div>
                  </div>
                );
              })}
            </div>
          )}
          <div style={{ display: "flex", gap: "8px", marginTop: "12px", flexWrap: "wrap" }}>
            {COUNTRIES.map((c) => <Btn key={c.id} small onClick={(e) => { e.stopPropagation(); onSelectCountry(c.id); }}>{c.flag} {c.name}の関税</Btn>)}
          </div>
        </div>
      )}
    </div>
  );
};

              ["RVC","付加価値基準（原産地判定）"],
              ["CTH","関税番号変更基準（原産地判定）"],
              ["MPF","商品処理手数料（米国）"],
              ["T/T","電信送金（Trade Termの略ではなくTelegraphic Transfer）"],
              ["L/C","信用状（Letter of Credit）"],
              ["D/P","支払渡し（Documents against Payment）"],
            ]} />
          </GSection>
        </div>
      </div>
    </div>
  );
};

const EMPTY_PRODUCT = { id: "", name: "", nameEn: "", hsCode: "", htsUs: "", description: "", notes: "", tags: [], examples: [], factors: [], alternatives: [], thresholds: [], nutrition: null, materials: [] };

const NUTRITION_FIELDS = [
  { key: "servingsPerContainer", label: "Servings per Container", type: "number", placeholder: "12" },
  { key: "servingSize", label: "Serving Size", type: "text", placeholder: "1 can (355ml)" },
  { key: "calories", label: "Calories", type: "number" },
  { key: "totalFat", label: "Total Fat (g)", type: "number" },
  { key: "saturatedFat", label: "Saturated Fat (g)", type: "number" },
  { key: "transFat", label: "Trans Fat (g)", type: "number" },
  { key: "cholesterol", label: "Cholesterol (mg)", type: "number" },
  { key: "sodium", label: "Sodium (mg)", type: "number" },
  { key: "totalCarb", label: "Total Carbohydrate (g)", type: "number" },
  { key: "dietaryFiber", label: "Dietary Fiber (g)", type: "number" },
  { key: "totalSugars", label: "Total Sugars (g)", type: "number" },
  { key: "addedSugars", label: "Added Sugars (g)", type: "number" },
  { key: "protein", label: "Protein (g)", type: "number" },
  { key: "vitD", label: "Vitamin D (mcg)", type: "number" },
  { key: "calcium", label: "Calcium (mg)", type: "number" },
  { key: "iron", label: "Iron (mg)", type: "number" },
  { key: "potassium", label: "Potassium (mg)", type: "number" },
  { key: "ingredients", label: "Ingredients (English)", type: "textarea", placeholder: "RICE KOJI (RICE, ASPERGILLUS ORYZAE), WATER..." },
  { key: "allergenNote", label: "Allergen Note", type: "text", placeholder: "Manufactured in a facility..." },
  { key: "netWeight", label: "Net Weight", type: "text", placeholder: "12 fl oz (355ml)" },
  { key: "netWeightG", label: "Net Weight (g)", type: "number", placeholder: "355" },
];

const ProductManager = ({ customProducts, onUpdate, builtIn = PRODUCT_DATABASE, apiKey = "" }) => {
  const [editing, setEditing] = useState(null); // null = list view, "new" = new, id = edit
  const [form, setForm] = useState(JSON.parse(JSON.stringify(EMPTY_PRODUCT)));
  const [openSections, setOpenSections] = useState({ basic: true });
  const [allergenInput, setAllergenInput] = useState("");
  const [tagInput, setTagInput] = useState("");
  const [pdfStatus, setPdfStatus] = useState(null);

  const toggleSection = (s) => setOpenSections(o => ({ ...o, [s]: !o[s] }));
  const uf = (key, val) => setForm(f => ({ ...f, [key]: val }));
  const un = (key, val) => setForm(f => ({ ...f, nutrition: { ...(f.nutrition || {}), [key]: val } }));

  const startNew = () => {
    setForm(JSON.parse(JSON.stringify(EMPTY_PRODUCT)));
    setAllergenInput("");
    setTagInput("");
    setEditing("new");
    setOpenSections({ basic: true });
  };

  const startEdit = (p) => {
    setForm(JSON.parse(JSON.stringify(p)));
    setAllergenInput(p.nutrition?.allergens?.join(", ") || "");
    setTagInput(p.tags?.join(", ") || "");
    setEditing(p.id);
    setOpenSections({ basic: true });
  };

  const save = () => {
    const p = { ...form };
    if (!p.name || !p.hsCode) return;
    if (!p.id) p.id = "custom_" + Date.now();
    p.tags = tagInput.split(",").map(t => t.trim()).filter(Boolean);
    if (p.nutrition) {
      p.nutrition.allergens = allergenInput.split(",").map(a => a.trim().toLowerCase()).filter(Boolean);
    }
    // Ensure numeric fields are numbers
    if (p.nutrition) {
      NUTRITION_FIELDS.forEach(f => {
        if (f.type === "number" && p.nutrition[f.key] !== undefined) {
          p.nutrition[f.key] = parseFloat(p.nutrition[f.key]) || 0;
        }
      });
    }
    const existing = customProducts.findIndex(cp => cp.id === p.id);
    if (existing >= 0) {
      const updated = [...customProducts];
      updated[existing] = p;
      onUpdate(updated);
    } else {
      onUpdate([...customProducts, p]);
    }
    setEditing(null);
  };

  const remove = (id) => { onUpdate(customProducts.filter(p => p.id !== id)); };

  const addMaterial = () => {
    setForm(f => ({ ...f, materials: [...(f.materials || []), { name: "", hsCode: "", origin: "JP", value: 0 }] }));
  };
  const updateMaterial = (idx, key, val) => {
    setForm(f => {
      const m = [...(f.materials || [])];
      m[idx] = { ...m[idx], [key]: key === "value" ? (parseFloat(val) || 0) : val };
      return { ...f, materials: m };
    });
  };
  const removeMaterial = (idx) => {
    setForm(f => ({ ...f, materials: (f.materials || []).filter((_, i) => i !== idx) }));
  };

  const handlePdfUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setPdfStatus("parsing");
    try {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej(new Error("Read failed"));
        r.readAsDataURL(file);
      });
      const mimeType = file.type || "application/pdf";
      if (!apiKey) { setPdfStatus("nokey"); return; }
      const sysPrompt = `Extract product data from this spec sheet/label. Return ONLY valid JSON with this schema:
{"name":"日本語名","nameEn":"English name","hsCode":"XXXX.XX","htsUs":"XXXX.XX.XXXX","description":"説明","nutrition":{"servingsPerContainer":0,"servingSize":"","calories":0,"totalFat":0,"saturatedFat":0,"transFat":0,"cholesterol":0,"sodium":0,"totalCarb":0,"dietaryFiber":0,"totalSugars":0,"addedSugars":0,"protein":0,"vitD":0,"calcium":0,"iron":0,"potassium":0,"ingredients":"","allergens":["soy"],"allergenNote":"","netWeight":"","netWeightG":0}}
Use null for nutrition if not found. Use empty string for missing text fields, 0 for missing numbers.`;
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: sysPrompt }] },
          contents: [{ parts: [{ inlineData: { mimeType, data: base64 } }, { text: "この製品スペックシート/ラベルからデータを抽出してください。" }] }],
        }),
      });
      const data = await resp.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      setForm(f => ({
        ...f,
        name: parsed.name || f.name,
        nameEn: parsed.nameEn || f.nameEn,
        hsCode: parsed.hsCode || f.hsCode,
        htsUs: parsed.htsUs || f.htsUs,
        description: parsed.description || f.description,
        nutrition: parsed.nutrition || f.nutrition,
      }));
      if (parsed.nutrition?.allergens) setAllergenInput(parsed.nutrition.allergens.join(", "));
      setPdfStatus("done");
    } catch (err) {
      console.error(err);
      setPdfStatus("error");
    }
  };

  const Section = ({ id, title, children }) => (
    <div style={{ border: `1px solid ${C.border}`, borderRadius: "8px", marginBottom: "10px", overflow: "hidden" }}>
      <div onClick={() => toggleSection(id)} style={{ padding: "10px 14px", background: C.grayLight, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: "14px", fontWeight: 700, color: C.text }}>{title}</span>
        <span style={{ color: C.textMuted }}>{openSections[id] ? "▲" : "▼"}</span>
      </div>
      {openSections[id] && <div style={{ padding: "14px" }}>{children}</div>}
    </div>
  );

  const Field = ({ label, value, onChange, type = "text", placeholder = "", wide }) => (
    <div style={{ marginBottom: "8px", flex: wide ? "1 1 100%" : "1 1 48%" }}>
      <div style={{ fontSize: "12px", fontWeight: 600, color: C.textLight, marginBottom: "3px" }}>{label}</div>
      {type === "textarea" ? (
        <textarea value={value || ""} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={3} style={{ width: "100%", padding: "8px 10px", border: `1px solid ${C.border}`, borderRadius: "6px", fontSize: "13px", boxSizing: "border-box", resize: "vertical", fontFamily: "inherit" }} />
      ) : (
        <input type={type} value={value ?? ""} onChange={e => onChange(type === "number" ? e.target.value : e.target.value)} placeholder={placeholder} style={{ width: "100%", padding: "8px 10px", border: `1px solid ${C.border}`, borderRadius: "6px", fontSize: "13px", boxSizing: "border-box" }} />
      )}
    </div>
  );

  // LIST VIEW
  if (!editing) return (
    <div>
      <SectionHeader sub={`登録済み ${builtIn.length + customProducts.length}品目（プリセット${builtIn.length} + カスタム${customProducts.length}）`}>📦 製品管理</SectionHeader>
      <div style={{ marginBottom: "16px" }}><Btn primary onClick={startNew}>＋ 新規製品を追加</Btn></div>
      {customProducts.length > 0 && (
        <div style={{ marginBottom: "20px" }}>
          <Label>カスタム製品</Label>
          {customProducts.map(p => (
            <Card key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 18px" }}>
              <div>
                <div style={{ fontSize: "14px", fontWeight: 700 }}>{p.name} <span style={{ color: C.textLight, fontWeight: 400 }}>{p.nameEn}</span></div>
                <div style={{ fontSize: "12px", color: C.textLight, fontFamily: "monospace" }}>HS: {p.hsCode} {p.htsUs ? `/ HTS: ${p.htsUs}` : ""}</div>
                <div style={{ display: "flex", gap: "4px", marginTop: "4px" }}>
                  {p.nutrition && <Pill color={C.green} bg={C.greenBg} border={C.greenBorder}>FDA栄養✓</Pill>}
                  {p.materials?.length > 0 && <Pill color={C.blue} bg={C.blueBg} border={C.blueBorder}>原材料✓</Pill>}
                </div>
              </div>
              <div style={{ display: "flex", gap: "6px" }}>
                <Btn small onClick={() => startEdit(p)}>✏️ 編集</Btn>
                <Btn small onClick={() => remove(p.id)} style={{ color: C.red }}>🗑️</Btn>
              </div>
            </Card>
          ))}
        </div>
      )}
      <Label>プリセット製品（読み取り専用）</Label>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: "8px" }}>
        {builtIn.map(p => (
          <div key={p.id} style={{ padding: "10px 14px", border: `1px solid ${C.border}`, borderRadius: "8px", background: C.grayLight }}>
            <div style={{ fontSize: "13px", fontWeight: 600 }}>{p.name}</div>
            <div style={{ fontSize: "12px", color: C.textLight, fontFamily: "monospace" }}>{p.hsCode}</div>
          </div>
        ))}
      </div>
    </div>
  );

  // EDIT / NEW VIEW
  return (
    <div>
      <SectionHeader sub={editing === "new" ? "新規製品を登録" : `${form.name} を編集中`}>📦 {editing === "new" ? "製品追加" : "製品編集"}</SectionHeader>

      {/* PDF Upload */}
      <Card style={{ border: `2px dashed ${C.amberBorder}`, background: C.amberLight, marginBottom: "16px" }}>
        <div style={{ fontSize: "14px", fontWeight: 700, color: "#744210", marginBottom: "6px" }}>📎 スペックシートから自動入力</div>
        <div style={{ fontSize: "13px", color: "#744210", marginBottom: "10px" }}>製品仕様書やラベル画像をアップロードすると、AIが商品名・HS番号・栄養成分等を自動抽出してフォームに入力します。</div>
        <label style={{ display: "inline-flex", alignItems: "center", gap: "8px", padding: "8px 16px", background: "#fff", border: `1.5px solid ${C.amberBorder}`, borderRadius: "8px", cursor: "pointer", fontSize: "13px", fontWeight: 600, color: "#744210" }}>
          📄 ファイルを選択
          <input type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" onChange={handlePdfUpload} style={{ display: "none" }} />
        </label>
        <span style={{ fontSize: "12px", color: C.textMuted, marginLeft: "8px" }}>PDF / PNG / JPG</span>
        {pdfStatus === "parsing" && <div style={{ fontSize: "13px", color: C.amber, marginTop: "8px" }}>🤖 AI解析中...（10〜30秒）</div>}
        {pdfStatus === "done" && <div style={{ fontSize: "13px", color: C.green, marginTop: "8px" }}>✅ フォームに反映しました。内容を確認・修正して保存してください。</div>}
        {pdfStatus === "error" && <div style={{ fontSize: "13px", color: C.red, marginTop: "8px" }}>❌ 読み取り失敗。別のファイルを試してください。</div>}
        {pdfStatus === "nokey" && <div style={{ fontSize: "13px", color: C.red, marginTop: "8px" }}>🔑 APIキーが未設定です。⚙️設定タブの「API設定」にGemini APIキーを入力してください。</div>}
      </Card>

      <TwoCol ratio="1fr 1fr"
        left={
          <div>
            <Section id="basic" title="📋 基本情報（必須）">
              <div style={{ display: "flex", flexWrap: "wrap", gap: "0 12px" }}>
                <Field label="商品名（日本語）" value={form.name} onChange={v => uf("name", v)} placeholder="KOJIPOP 発酵リカバリーソーダ" wide />
                <Field label="商品名（英語）" value={form.nameEn} onChange={v => uf("nameEn", v)} placeholder="KOJIPOP Fermented Recovery Soda" wide />
                <Field label="HS番号（6桁）" value={form.hsCode} onChange={v => uf("hsCode", v)} placeholder="2202.10" />
                <Field label="HTS-US番号（10桁）" value={form.htsUs} onChange={v => uf("htsUs", v)} placeholder="2202.10.0000" />
                <Field label="説明" value={form.description} onChange={v => uf("description", v)} type="textarea" placeholder="製品の概要説明" wide />
                <Field label="注意事項" value={form.notes} onChange={v => uf("notes", v)} type="textarea" placeholder="分類上の留意点など" wide />
                <Field label="タグ（カンマ区切り）" value={tagInput} onChange={setTagInput} placeholder="飲料, 炭酸, 発酵" wide />
              </div>
            </Section>

            <Section id="materials" title="🌾 原材料構成（原産地判定用）">
              <Tip>EPA/FTA特恵税率の適格性を判定するために使います。不要なら空欄でOK。</Tip>
              {(form.materials || []).map((m, i) => (
                <div key={i} style={{ display: "flex", gap: "6px", alignItems: "end", marginBottom: "6px", flexWrap: "wrap" }}>
                  <Field label="原材料名" value={m.name} onChange={v => updateMaterial(i, "name", v)} placeholder="米麹" />
                  <Field label="HS番号" value={m.hsCode} onChange={v => updateMaterial(i, "hsCode", v)} placeholder="1104.29" />
                  <div style={{ marginBottom: "8px" }}>
                    <div style={{ fontSize: "12px", fontWeight: 600, color: C.textLight, marginBottom: "3px" }}>原産国</div>
                    <select value={m.origin} onChange={e => updateMaterial(i, "origin", e.target.value)} style={{ padding: "8px", border: `1px solid ${C.border}`, borderRadius: "6px", fontSize: "13px" }}>
                      <option value="JP">🇯🇵 JP</option><option value="CN">🇨🇳 CN</option><option value="TH">🇹🇭 TH</option><option value="US">🇺🇸 US</option><option value="other">🌐 Other</option>
                    </select>
                  </div>
                  <Field label="金額(¥)" value={m.value} onChange={v => updateMaterial(i, "value", v)} type="number" placeholder="100" />
                  <button onClick={() => removeMaterial(i)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "16px", color: C.red, marginBottom: "12px" }}>✕</button>
                </div>
              ))}
              <Btn small onClick={addMaterial}>＋ 原材料を追加</Btn>
            </Section>
          </div>
        }
        right={
          <div>
            <Section id="nutrition" title="🏷️ FDA栄養成分（ラベル生成用）">
              <Tip>FDAラベル自動生成に使います。入力するとFDAラベルタブで利用可能に。不要なら空欄でOK。</Tip>
              <div style={{ marginBottom: "8px" }}>
                <Btn small onClick={() => setForm(f => ({ ...f, nutrition: f.nutrition ? null : {} }))}>
                  {form.nutrition ? "❌ 栄養データを削除" : "＋ 栄養データを追加"}
                </Btn>
              </div>
              {form.nutrition && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: "0 12px" }}>
                  {NUTRITION_FIELDS.map(f => (
                    <Field key={f.key} label={f.label} value={form.nutrition[f.key]} onChange={v => un(f.key, v)} type={f.type || "text"} placeholder={f.placeholder || ""} wide={f.type === "textarea"} />
                  ))}
                  <Field label="アレルゲン（カンマ区切り）" value={allergenInput} onChange={setAllergenInput} placeholder="soy, wheat" wide />
                </div>
              )}
            </Section>
          </div>
        }
      />

      <div style={{ display: "flex", gap: "10px", marginTop: "16px", justifyContent: "flex-end" }}>
        <Btn onClick={() => setEditing(null)}>キャンセル</Btn>
        <Btn primary onClick={save} style={{ opacity: form.name && form.hsCode ? 1 : 0.5 }}>💾 {editing === "new" ? "製品を登録" : "変更を保存"}</Btn>
      </div>
    </div>
  );
};

  useEffect(() => {

  const [aiEmailCopied, setAiEmailCopied] = useState(false);

  // ========== AI ALERTS (Dashboard) ==========
  const [aiAlerts, setAiAlerts] = useState(() => {
    try {
      const saved = localStorage.getItem("oryzae_ai_alerts");
      return saved ? JSON.parse(saved) : null;
    } catch { return null; }
  });
  const [aiAlertsLoading, setAiAlertsLoading] = useState(false);
  const [aiAlertsError, setAiAlertsError] = useState(null);
  const [aiAlertsLastUpdated, setAiAlertsLastUpdated] = useState(() => localStorage.getItem("oryzae_ai_alerts_ts") || null);

  // aiAlertsをlocalStorageに同期
  useEffect(() => {
    if (aiAlerts) {
      try { localStorage.setItem("oryzae_ai_alerts", JSON.stringify(aiAlerts)); } catch {}
    }
  }, [aiAlerts]);
  useEffect(() => {
    if (aiAlertsLastUpdated) {
      try { localStorage.setItem("oryzae_ai_alerts_ts", aiAlertsLastUpdated); } catch {}
    }
  }, [aiAlertsLastUpdated]);

  // ========== AI アラートリセット ==========
  const resetAiAlerts = () => {
    setAiAlerts(null);
    setAiAlertsLastUpdated(null);
    setAiAlertsError(null);
    try { localStorage.removeItem("oryzae_ai_alerts"); localStorage.removeItem("oryzae_ai_alerts_ts"); } catch {}
  };

  // ========== AI HELPER ==========
  const callGemini = async (sysPrompt, userMsg, files = []) => {
    const parts = files.map(f => ({ inlineData: { mimeType: f.mimeType, data: f.data } }));
    parts.push({ text: userMsg });
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ systemInstruction: { parts: [{ text: sysPrompt }] }, contents: [{ parts }] })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || `API Error HTTP ${resp.status}`);
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    if (!text) throw new Error("AIからの応答が空でした");

    const landedCost = retail * (1 - f.retailMargin/100);
    const fobImporter = landedCost * (1 - f.distMargin/100);
    const duty = fobImporter * (f.dutyRate/100);
    const freight = parseFloat(f.freightUSD)||0;
    const insurance = fobImporter * (f.insurancePct/100);
    const broker = parseFloat(f.brokerFee)||0;
    const fobUSD = fobImporter - duty - freight - insurance - broker;
    const fobJPY = fobUSD * (parseFloat(f.fxUSD)||150);
    const grossMargin = retail > 0 ? ((retail - landedCost)/retail*100).toFixed(1) : 0;
    return { retail, landedCost: landedCost.toFixed(2), fobImporter: fobImporter.toFixed(2), duty: duty.toFixed(2), freight, insurance: insurance.toFixed(2), broker, fobUSD: Math.max(0,fobUSD).toFixed(2), fobJPY: Math.max(0,fobJPY).toFixed(0), grossMargin };

                        style={{ width:"100%",padding:"8px 12px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"13px",boxSizing:"border-box" }}/>
                    </div>
                  ))}
                  <div style={{padding:"10px",background:C.blueBg,border:`1px solid ${C.blueBorder}`,borderRadius:"6px",fontSize:"12px",color:C.blue}}>
                    円安 → FOBのUSD換算が下がり競争力UP。ただし輸入物価上昇・消費者購買力低下に注意。
                  </div>
                </Card>}
                right={<Card>
                  <div style={{fontSize:"13px",fontWeight:700,marginBottom:"12px"}}>📊 USD/JPY別コスト試算</div>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:"13px"}}>
                      <thead>
                        <tr style={{background:C.bg}}>
                          {["USD/JPY","FOB(USD)","関税(USD)","Landed Cost(USD)","コスト変化"].map(h=>(
                            <th key={h} style={{padding:"8px 10px",textAlign:"right",fontWeight:700,fontSize:"11px",color:C.textLight,borderBottom:`2px solid ${C.border}`}}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {fxSensRows.map((row,i)=>{
                          const isBase = row.fx===150;
                          const baseRow = fxSensRows.find(r=>r.fx===150);
                          const diff = baseRow ? ((parseFloat(row.landed)-parseFloat(baseRow.landed))/parseFloat(baseRow.landed)*100).toFixed(1) : 0;
                          return (
                            <tr key={i} style={{background:isBase?"#fef9c3":"transparent",fontWeight:isBase?700:400}}>
                              <td style={{padding:"7px 10px",textAlign:"right",borderBottom:`1px solid ${C.border}`,color:isBase?C.primary:C.text}}>¥{row.fx}{isBase?" ←基準":""}</td>
                              <td style={{padding:"7px 10px",textAlign:"right",borderBottom:`1px solid ${C.border}`}}>${row.fobUSD}</td>
                              <td style={{padding:"7px 10px",textAlign:"right",borderBottom:`1px solid ${C.border}`}}>${row.dutyUSD}</td>
                              <td style={{padding:"7px 10px",textAlign:"right",borderBottom:`1px solid ${C.border}`,fontWeight:700}}>${row.landed}</td>
                              <td style={{padding:"7px 10px",textAlign:"right",borderBottom:`1px solid ${C.border}`,color:isBase?C.textMuted:parseFloat(diff)<0?C.green:C.red,fontWeight:700}}>{isBase?"—":diff>0?"+"+diff+"%":diff+"%"}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  <div style={{marginTop:"10px",fontSize:"12px",color:C.textMuted}}>※ 通関費は1,000個で按分。1個あたり ÷1000として計算。</div>
                </Card>}
              />
            </div>
          )}

          {/* ===== EUラベル ===== */}
          {mode === "eu_label" && (
            <div>
              <SectionHeader sub="EU規則1169/2011 & 英国食品表示規則 準拠ラベル原稿作成">🇪🇺 EUラベルチェッカー</SectionHeader>
              <TwoCol ratio="1fr 340px"
                left={<div>
                  <Card>
                    <div style={{fontSize:"13px",fontWeight:700,marginBottom:"10px"}}>📦 製品情報</div>
                    {[["製品名（商品名）","productName","例: ORYZAE Rice Koji Sweetener"],["法令上の商品名（Legal name）","legalName","例: Rice syrup (processed with Aspergillus oryzae)"],["正味量","netQuantity","例: 500 mL"],["原産国","countryOfOrigin","Japan"],["保存方法","storageConditions","例: Store in a cool, dry place"],["賞味期限方式","duraMinDate","例: Best before: see bottom"],["ロット番号表示","lotNumber","例: Lot: see bottom of label"],["事業者名・住所（EU/英国担当者）","operator","例: Oryzae Europe GmbH, Musterstraße 1, 10115 Berlin, Germany"]].map(([lbl,key,ph])=>(
                      <div key={key} style={{marginBottom:"8px"}}>
                        <Label>{lbl}</Label>
                        <input value={euForm[key]||""} onChange={e=>setEuForm(f=>({...f,[key]:e.target.value}))} placeholder={ph}
                          style={{ width:"100%",padding:"6px 10px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"13px",boxSizing:"border-box" }}/>
                      </div>
                    ))}
                  </Card>
                  <Card style={{marginTop:"10px"}}>
                    <div style={{fontSize:"13px",fontWeight:700,marginBottom:"8px"}}>🧪 原材料・アレルゲン（EU 14種）</div>
                    <Label>原材料リスト（英語）</Label>
                    <textarea value={euForm.ingredients} onChange={e=>setEuForm(f=>({...f,ingredients:e.target.value}))} rows={3} placeholder="Rice (90%), Water, Aspergillus oryzae culture"
                      style={{ width:"100%",padding:"8px 12px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"13px",resize:"vertical",boxSizing:"border-box",marginBottom:"10px" }}/>
                    <div style={{fontSize:"11px",fontWeight:600,color:C.textLight,marginBottom:"6px"}}>アレルゲン（EU規則1169/2011 別表II 14種）</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"8px"}}>
                      {EU_ALLERGENS.map(a=>(
                        <label key={a} style={{display:"flex",alignItems:"center",gap:"4px",padding:"3px 8px",borderRadius:"20px",cursor:"pointer",fontSize:"11px",fontWeight:600,
                          background:euForm.allergens.includes(a)?"#fef2f2":C.bg, border:`1px solid ${euForm.allergens.includes(a)?"#fca5a5":C.border}`,
                          color:euForm.allergens.includes(a)?"#dc2626":C.textLight}}>
                          <input type="checkbox" checked={euForm.allergens.includes(a)} onChange={()=>euToggleAllergen(a)} style={{width:"11px",height:"11px"}}/>
                          {a}
                        </label>
                      ))}
                    </div>
                  </Card>
                  <Card style={{marginTop:"10px"}}>
                    <div style={{fontSize:"13px",fontWeight:700,marginBottom:"8px"}}>📐 栄養成分表示（100g/100mLあたり）</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
                      {[["エネルギー(kJ)","energy_kj","kJ"],["エネルギー(kcal)","energy_kcal","kcal"],["脂質(g)","fat","g"],["飽和脂肪酸(g)","saturates","g"],["炭水化物(g)","carbohydrate","g"],["糖質(g)","sugars","g"],["食物繊維(g)","fibre","g"],["タンパク質(g)","protein","g"],["食塩相当量(g)","salt","g"]].map(([lbl,key,unit])=>(
                        <div key={key}>
                          <div style={{fontSize:"10px",fontWeight:600,color:C.textLight,marginBottom:"2px"}}>{lbl}</div>
                          <input type="number" step="0.1" value={euForm.nutrition[key]||0} onChange={e=>euNutField(key,parseFloat(e.target.value)||0)}
                            style={{ width:"100%",padding:"5px 8px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"12px",boxSizing:"border-box" }}/>
                        </div>
                      ))}
                    </div>
                  </Card>
                </div>}
                right={<div style={{position:"sticky",top:"20px"}}>
                  <Card style={{fontFamily:"'Helvetica Neue',Helvetica,Arial,sans-serif"}}>
                    <div style={{fontSize:"13px",fontWeight:700,marginBottom:"10px"}}>🇪🇺 EUラベル プレビュー</div>
                    <div style={{fontSize:"14px",fontWeight:700,marginBottom:"2px"}}>{euForm.productName||"[製品名]"}</div>
                    {euForm.legalName && <div style={{fontSize:"12px",color:C.textLight,marginBottom:"6px",fontStyle:"italic"}}>{euForm.legalName}</div>}
                    {euForm.ingredients && <div style={{fontSize:"11px",marginBottom:"6px",lineHeight:1.5}}>
                      <strong>INGREDIENTS: </strong>
                      {euForm.ingredients.split(/[,;]/).map((ing,i)=>{
                        const trimmed = ing.trim();
                        const isAllergen = EU_ALLERGENS.some(a=>trimmed.toLowerCase().includes(a.toLowerCase().split(" ")[0]));
                        return <span key={i}>{i>0?", ":""}<span style={{fontWeight:isAllergen?700:400,textDecoration:isAllergen?"underline":"none"}}>{trimmed}</span></span>;
                      })}
                    </div>}
                    {euForm.allergens.length>0 && <div style={{fontSize:"11px",marginBottom:"6px",fontWeight:700,color:"#dc2626"}}>Contains: {euForm.allergens.join(", ")}.</div>}
                    {euForm.netQuantity && <div style={{fontSize:"11px",marginBottom:"4px"}}><strong>Net Quantity:</strong> {euForm.netQuantity}</div>}
                    {euForm.countryOfOrigin && <div style={{fontSize:"11px",marginBottom:"4px"}}><strong>Country of Origin:</strong> {euForm.countryOfOrigin}</div>}
                    {euForm.storageConditions && <div style={{fontSize:"11px",marginBottom:"4px"}}><strong>Storage:</strong> {euForm.storageConditions}</div>}
                    {euForm.duraMinDate && <div style={{fontSize:"11px",marginBottom:"4px"}}><strong>Best before:</strong> {euForm.duraMinDate}</div>}
                    {euForm.lotNumber && <div style={{fontSize:"11px",marginBottom:"4px"}}><strong>Lot no.:</strong> {euForm.lotNumber}</div>}
                    {euForm.operator && <div style={{fontSize:"11px",marginBottom:"8px",color:C.textLight}}>{euForm.operator}</div>}
                    {Object.values(euForm.nutrition).some(v=>v>0) && (
                      <div style={{border:"1px solid #000",marginTop:"6px"}}>
                        <div style={{background:"#000",color:"#fff",fontSize:"11px",fontWeight:700,padding:"3px 6px"}}>Nutrition Declaration</div>
                        <div style={{fontSize:"10px",padding:"2px 6px",background:"#f5f5f5",fontStyle:"italic"}}>Per 100g / per 100mL</div>
                        {[["Energy",`${euForm.nutrition.energy_kj}kJ / ${euForm.nutrition.energy_kcal}kcal`],["Fat",`${euForm.nutrition.fat}g`],
                          ["  of which saturates",`${euForm.nutrition.saturates}g`],["Carbohydrate",`${euForm.nutrition.carbohydrate}g`],
                          ["  of which sugars",`${euForm.nutrition.sugars}g`],["Fibre",`${euForm.nutrition.fibre}g`],
                          ["Protein",`${euForm.nutrition.protein}g`],["Salt",`${euForm.nutrition.salt}g`]].map(([lbl,val])=>(
                          <div key={lbl} style={{display:"flex",justifyContent:"space-between",padding:"2px 6px",borderTop:"1px solid #ddd",fontSize:"10px"}}>
                            <span style={{fontStyle:lbl.startsWith("  ")?"italic":"normal"}}>{lbl.trim()}</span>
                            <span style={{fontWeight:700}}>{val}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </Card>
                  <Card style={{marginTop:"10px",background:C.greenBg,border:`1px solid ${C.greenBorder}`}}>
                    <div style={{fontSize:"12px",fontWeight:700,color:C.green,marginBottom:"6px"}}>✅ EU必須表示項目チェック</div>
                    {[
                      ["製品名（商品名）",!!euForm.productName],["法令上の商品名",!!euForm.legalName],
                      ["原材料リスト",!!euForm.ingredients],["アレルゲン強調表示",euForm.allergens.length>0||!!euForm.ingredients],
                      ["正味量",!!euForm.netQuantity],["賞味期限",!!euForm.duraMinDate],
                      ["保存方法",!!euForm.storageConditions],["事業者名・住所",!!euForm.operator],
                      ["原産国",!!euForm.countryOfOrigin],["ロット番号",!!euForm.lotNumber],
                      ["栄養成分表示",Object.values(euForm.nutrition).some(v=>v>0)],
                    ].map(([lbl,ok])=>(
                      <div key={lbl} style={{display:"flex",gap:"6px",alignItems:"center",padding:"3px 0",fontSize:"12px",color:ok?C.green:C.textMuted}}>
                        <span>{ok?"✅":"☐"}</span><span style={{textDecoration:ok?"none":"none"}}>{lbl}</span>
                      </div>
                    ))}
                  </Card>
                </div>}
              />
            </div>
          )}

          {/* ===== 出荷台帳 ===== */}
          {mode === "shipment_log" && (
            <div>
              <SectionHeader sub="出荷実績の記録・集計・仕向地別分析">📦 出荷台帳</SectionHeader>
              <div style={{display:"flex",gap:"16px",marginBottom:"16px",flexWrap:"wrap"}}>
                {[["総出荷額",`$${shipStats.totalUSD.toLocaleString("en",{minimumFractionDigits:0,maximumFractionDigits:0})}`],["総出荷数",`${shipStats.totalQty.toLocaleString()}個`],["記録件数",`${shipments.length}件`]].map(([lbl,val])=>(
                  <Card key={lbl} style={{flex:"1",minWidth:"140px",textAlign:"center",padding:"12px"}}>
                    <div style={{fontSize:"11px",color:C.textMuted,marginBottom:"4px"}}>{lbl}</div>
                    <div style={{fontSize:"22px",fontWeight:900,color:C.primary}}>{val}</div>
                  </Card>
                ))}
                {Object.entries(shipStats.byDest).map(([dest,total])=>{
                  const c = COUNTRIES.find(x=>x.id===dest);
                  return (
                    <Card key={dest} style={{flex:"1",minWidth:"120px",textAlign:"center",padding:"12px"}}>
                      <div style={{fontSize:"16px"}}>{c?.flag||"🌏"}</div>
                      <div style={{fontSize:"11px",color:C.textMuted}}>{c?.name||dest}</div>
                      <div style={{fontSize:"16px",fontWeight:700,color:C.text}}>${Math.round(total).toLocaleString()}</div>
                    </Card>
                  );
                })}
              </div>
              <div style={{marginBottom:"12px"}}>
                <Btn primary onClick={()=>setShipFormOpen(o=>!o)}>{shipFormOpen?"✕ 閉じる":"＋ 出荷を記録"}</Btn>
              </div>
              {shipFormOpen && (
                <Card style={{marginBottom:"16px",border:`2px solid ${C.primary}`}}>
                  <div style={{fontSize:"13px",fontWeight:700,marginBottom:"12px"}}>📝 新規出荷登録</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"10px"}}>
                    {[["出荷日","date","date",""],["商品名","product","text","例: 米麹甘味料 200ml"],["仕向地","destination","select",""],
                      ["数量(個)","qty","number",""],["単価(USD)","unitPriceUSD","number",""],["HSコード","hsCode","text","1702.90"],
                      ["フォワーダー","forwarder","text",""],["ステータス","status","select",""]].map(([lbl,key,type,ph])=>(
                      <div key={key}>
                        <Label>{lbl}</Label>
                        {type==="select"&&key==="destination" ? (
                          <select value={shipForm.destination} onChange={e=>setShipForm(f=>({...f,destination:e.target.value}))} style={{ width:"100%",padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"13px" }}>
                            {COUNTRIES.map(c=><option key={c.id} value={c.id}>{c.flag} {c.name}</option>)}
                          </select>
                        ) : type==="select"&&key==="status" ? (
                          <select value={shipForm.status} onChange={e=>setShipForm(f=>({...f,status:e.target.value}))} style={{ width:"100%",padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"13px" }}>
                            {["予定","準備中","出荷済","通関中","配達済","保留"].map(s=><option key={s}>{s}</option>)}
                          </select>
                        ) : (
                          <input type={type} value={shipForm[key]} onChange={e=>setShipForm(f=>({...f,[key]:e.target.value}))} placeholder={ph}
                            style={{ width:"100%",padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"13px",boxSizing:"border-box" }}/>
                        )}
                      </div>
                    ))}
                  </div>
                  <Label>備考</Label>
                  <input value={shipForm.notes} onChange={e=>setShipForm(f=>({...f,notes:e.target.value}))} placeholder="特記事項"
                    style={{ width:"100%",padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:"6px",fontSize:"13px",marginBottom:"12px",boxSizing:"border-box" }}/>
                  <Btn primary onClick={addShipment} disabled={!shipForm.date||!shipForm.product||!shipForm.qty}>📦 登録する</Btn>
                </Card>
              )}
              {shipments.length===0 ? (
                <Card style={{background:C.grayLight,border:`2px dashed ${C.border}`}}><div style={{color:C.textMuted,fontSize:"13px",textAlign:"center",padding:"30px 0"}}>まだ出荷記録がありません。「出荷を記録」ボタンから追加してください。</div></Card>
              ) : (
                <Card style={{padding:0,overflow:"hidden"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:"13px"}}>
                    <thead>
                      <tr style={{background:C.bg}}>
                        {["出荷日","商品","仕向地","数量","金額(USD)","HS","フォワーダー","状態",""].map(h=>(
                          <th key={h} style={{padding:"10px 12px",textAlign:"left",fontWeight:700,fontSize:"11px",color:C.textLight,borderBottom:`2px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {shipments.map((s,i)=>{
                        const c = COUNTRIES.find(x=>x.id===s.destination);
                        const statusColor = s.status==="配達済"?C.green:s.status==="出荷済"||s.status==="通関中"?C.primary:s.status==="保留"?C.red:C.textLight;
                        return (
                          <tr key={s.id} style={{background:i%2===0?"transparent":C.bg}}>
                            <td style={{padding:"8px 12px",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{s.date}</td>
                            <td style={{padding:"8px 12px",borderBottom:`1px solid ${C.border}`,maxWidth:"140px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.product}</td>
                            <td style={{padding:"8px 12px",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{c?.flag} {c?.name||s.destination}</td>
                            <td style={{padding:"8px 12px",borderBottom:`1px solid ${C.border}`,textAlign:"right"}}>{parseInt(s.qty).toLocaleString()}</td>
                            <td style={{padding:"8px 12px",borderBottom:`1px solid ${C.border}`,textAlign:"right",fontWeight:700}}>${s.totalUSD.toLocaleString("en",{minimumFractionDigits:0})}</td>
                            <td style={{padding:"8px 12px",borderBottom:`1px solid ${C.border}`,color:C.textMuted}}>{s.hsCode}</td>
                            <td style={{padding:"8px 12px",borderBottom:`1px solid ${C.border}`,color:C.textLight}}>{s.forwarder}</td>
                            <td style={{padding:"8px 12px",borderBottom:`1px solid ${C.border}`}}>
                              <span style={{padding:"2px 8px",borderRadius:"12px",background:statusColor+"15",color:statusColor,fontSize:"11px",fontWeight:700}}>{s.status}</span>
                            </td>
                            <td style={{padding:"8px 12px",borderBottom:`1px solid ${C.border}`}}>
                              <button onClick={()=>deleteShipment(s.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.textMuted,fontSize:"14px"}}>🗑</button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </Card>
              )}
            </div>
          )}

          {mode === "products" && <ProductManager customProducts={customProducts} onUpdate={setCustomProducts} apiKey={apiKey} />}
          {mode === "settings" && <SettingsPanel settings={settings} onUpdate={setSettings} apiKey={apiKey} onApiKeyChange={setApiKey} />}
          {mode === "guide" && <GuidePanel guideOpen={guideOpen} setGuideOpen={setGuideOpen} />}

        </div>
        {/* FOOTER */}
        <div style={{ padding: "16px 24px 28px", borderTop: `1px solid ${C.border}`, maxWidth: "960px" }}>
          <div style={{ fontSize: "11px", color: C.textMuted, lineHeight: 1.7 }}>
            本ツールは参考情報です。最終判断は各国税関当局・通関士に確認してください。<br />
            外部専門家が必要: ①米国Licensed Customs Broker（法的義務） ②FDA US Agent（法的義務）<br />
            © 2026 ORYZAE Inc. — Export Ops v3.0
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(ORYZAEExportTool), document.getElementById('root'));
</script>
</body>
</html>
