const fmt = (n, d = 0) => n?.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d }) ?? "—";
const fmtJPY = (n) => "¥" + fmt(Math.round(n));
const fmtUSD = (n) => "$" + fmt(n, 2);

// ============================================================
// DESIGN TOKENS (Desktop)
// ============================================================
const C = {
  amber: "#C8850A", amberLight: "#FFF9ED", amberBorder: "#F0D38A",
  red: "#C53030", green: "#276749", greenBg: "#F0FFF4", greenBorder: "#C6F6D5",
  blue: "#2B6CB0", blueBg: "#EBF8FF", blueBorder: "#BEE3F8",
  gray: "#718096", grayLight: "#F7FAFC", border: "#E2E8F0", bg: "#F7F6F3", white: "#fff",
  sidebar: "#1A1814", sidebarHover: "#2D2A22", sidebarActive: "#3D3826",
  text: "#2D3748", textLight: "#718096", textMuted: "#A0AEC0",
};

const font = "'Hiragino Kaku Gothic ProN', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif";

// ============================================================
// UI PRIMITIVES (Desktop)
// ============================================================
const Pill = ({ children, color = "#744210", bg = C.amberLight, border = C.amberBorder, style = {} }) => (
  <span style={{ display: "inline-block", padding: "2px 10px", borderRadius: "99px", fontSize: "12px", fontWeight: 600, color, background: bg, border: `1px solid ${border}`, whiteSpace: "nowrap", ...style }}>{children}</span>
);

const Tip = ({ children }) => (
  <div style={{ background: "#FFFFF0", border: "1px solid #FEFCBF", borderLeft: "3px solid #D69E2E", borderRadius: "6px", padding: "10px 14px", fontSize: "13px", color: "#744210", lineHeight: 1.6, marginTop: "8px" }}>
    💡 {children}
  </div>
);

const Card = ({ children, style = {} }) => (
  <div style={{ background: C.white, border: `1px solid ${C.border}`, borderRadius: "10px", padding: "20px", marginBottom: "14px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", ...style }}>{children}</div>
);

const Label = ({ children }) => (
  <div style={{ fontSize: "13px", fontWeight: 700, color: C.text, marginBottom: "6px", letterSpacing: "0.01em" }}>{children}</div>
);

const SectionHeader = ({ children, sub }) => (
  <div style={{ marginBottom: "16px" }}>
    <div style={{ fontSize: "20px", fontWeight: 800, color: C.text, letterSpacing: "-0.02em" }}>{children}</div>
    {sub && <div style={{ fontSize: "13px", color: C.textLight, marginTop: "2px" }}>{sub}</div>}
  </div>
);

const Select = ({ value, onChange, options, placeholder }) => (
  <select value={value} onChange={(e) => onChange(e.target.value)} style={{ padding: "10px 14px", border: `1px solid ${C.border}`, borderRadius: "8px", fontSize: "14px", background: C.white, width: "100%", boxSizing: "border-box", color: C.text, cursor: "pointer" }}>
    {placeholder && <option value="">{placeholder}</option>}
    {options.map((o) => <option key={o.value} value={o.value}>{o.label}</option>)}
  </select>
);

const Input = ({ value, onChange, placeholder, type = "text", style = {} }) => (
  <input type={type} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
    style={{ padding: "10px 14px", border: `1px solid ${C.border}`, borderRadius: "8px", fontSize: "14px", width: "100%", boxSizing: "border-box", background: C.white, color: C.text, ...style }} />
);

const Btn = ({ children, onClick, primary, small, style = {} }) => (
  <button onClick={onClick} style={{ padding: small ? "6px 14px" : "10px 20px", border: primary ? "none" : `1px solid ${C.border}`, borderRadius: "8px", background: primary ? C.amber : C.white, color: primary ? "#fff" : C.text, fontSize: small ? "12px" : "14px", fontWeight: 600, cursor: "pointer", transition: "all 0.15s", ...style }}>{children}</button>
);

const CountryTabs = ({ selected, onSelect }) => (
  <div style={{ display: "flex", gap: "8px", marginBottom: "16px", flexWrap: "wrap" }}>
    {COUNTRIES.map((c) => (
      <button key={c.id} onClick={() => onSelect(c.id)} style={{ padding: "8px 16px", border: selected === c.id ? `2px solid ${C.amber}` : `1px solid ${C.border}`, borderRadius: "8px", background: selected === c.id ? C.amberLight : C.white, cursor: "pointer", fontSize: "13px", fontWeight: selected === c.id ? 700 : 500, color: selected === c.id ? "#744210" : C.text, transition: "all 0.15s" }}>{c.flag} {c.name}</button>
    ))}
  </div>
);

const TwoCol = ({ left, right, ratio = "1fr 1fr" }) => {
  // Parse ratio to get relative sizing hints
  const parts = ratio.split(/\s+/);
  const parseW = (s) => {
    if (s.endsWith("px")) return { flex: `0 1 ${s}`, minWidth: "0" };
    if (s === "1fr") return { flex: "1 1 260px", minWidth: "0" };
    return { flex: "1 1 260px", minWidth: "0" };
  };
  const ls = parseW(parts[0] || "1fr");
  const rs = parseW(parts[1] || "1fr");
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: "20px" }}>
      <div style={ls}>{left}</div>
      <div style={rs}>{right}</div>
    </div>
  );
};

const AlertBanner = ({ alert, expanded, onToggle }) => {
  const colors = { critical: { bg: "#FFF5F5", border: "#FED7D7", text: "#9B2C2C", icon: "🔴" }, warning: { bg: C.amberLight, border: C.amberBorder, text: "#744210", icon: "🟡" }, info: { bg: C.blueBg, border: C.blueBorder, text: C.blue, icon: "🔵" } };
  const cl = colors[alert.severity] || colors.info;
  return (
    <div style={{ background: cl.bg, border: `1px solid ${cl.border}`, borderRadius: "8px", padding: "12px 16px", marginBottom: "8px", cursor: "pointer", transition: "box-shadow 0.15s" }} onClick={onToggle}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: "14px", fontWeight: 700, color: cl.text }}>{cl.icon} {alert.title}</div>
        <span style={{ fontSize: "12px", color: C.textMuted }}>{expanded ? "▲" : "▼"}</span>
      </div>
      <div style={{ fontSize: "13px", color: cl.text, opacity: 0.85, marginTop: "4px" }}>{alert.summary}</div>
      {expanded && <div style={{ fontSize: "13px", color: cl.text, opacity: 0.75, marginTop: "8px", lineHeight: 1.6, borderTop: `1px solid ${cl.border}`, paddingTop: "8px" }}>{alert.detail}<div style={{ fontSize: "12px", color: C.textMuted, marginTop: "6px" }}>最終確認: {alert.lastVerified}</div></div>}
    </div>
  );
};

// ============================================================
// LANDED COST CALCULATOR
// ============================================================
const LandedCostCalc = ({ settings = DEFAULT_SETTINGS, products = PRODUCT_DATABASE, initialProduct = "", initialCountry = "us" }) => {
  const [productId, setProductId] = useState(initialProduct);
  const [countryId, setCountryId] = useState(initialCountry);
  useEffect(() => { setProductId(initialProduct); }, [initialProduct]);
  useEffect(() => { setCountryId(initialCountry); }, [initialCountry]);
  const [fobJPY, setFobJPY] = useState("");
  const [qty, setQty] = useState("");
  const [shipping, setShipping] = useState("sea");
  const [retailPrice, setRetailPrice] = useState("");

  const product = products.find((p) => p.id === productId);
  const country = COUNTRIES.find((c) => c.id === countryId);
  const tariff = product && country ? country.tariffs[product.hsCode] : null;

  const calc = useMemo(() => {
    if (!fobJPY || !qty || !tariff || !country) return null;
    const fobUnit = parseFloat(fobJPY);
    const units = parseInt(qty);
    const fxKey = country.currency === "EUR" ? "eur" : country.currency === "GBP" ? "gbp" : "usd";
    const rate = settings.fx[fxKey] || country.exchangeRate || 150;
    const fobUSD = fobUnit / rate;
    const fobTotal = fobUSD * units;
    const freightPerUnit = shipping === "sea" ? settings.freight.seaPerUnit : settings.freight.airPerUnit;
    const freightTotal = freightPerUnit * units;
    const insuranceRate = settings.insurance / 100;
    const insurance = fobTotal * insuranceRate;
    const cifTotal = fobTotal + freightTotal + insurance;
    let dutyRate = 0;
    if (countryId === "us") { dutyRate = (tariff.mfnNum || 0) + (country.section122?.rateNum || 0); }
    else { dutyRate = tariff.ftaNum ?? tariff.mfnNum ?? 0; }
    const dutyAmount = cifTotal * (dutyRate / 100);
    const brokerFee = settings.brokerFee[countryId] || country.customsBrokerFee || 200;
    const mpf = countryId === "us" ? Math.min(Math.max(cifTotal * (settings.mpfRate / 100), settings.mpfMin), settings.mpfMax) : 0;
    const hmf = countryId === "us" && shipping === "sea" ? cifTotal * (settings.hmfRate / 100) : 0;
    const totalLanded = cifTotal + dutyAmount + brokerFee + mpf + hmf;
    const landedPerUnit = totalLanded / units;
    const retail = retailPrice ? parseFloat(retailPrice) : null;
    const margin = retail ? ((retail - landedPerUnit) / retail) * 100 : null;
    return { fobUSD, fobTotal, freightTotal, insurance, cifTotal, dutyRate, dutyAmount, brokerFee, mpf, hmf, totalLanded, landedPerUnit, margin, rate, units };
  }, [fobJPY, qty, tariff, country, countryId, shipping, retailPrice, settings]);

  return (
    <div>
      <SectionHeader sub="FOB → 着荷原価を自動試算。⚙️設定タブで運賃・為替を変更可能。">💵 Landed Cost 計算機</SectionHeader>
      <TwoCol ratio="380px 1fr"
        left={
          <Card>
            <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
              <div><Label>製品</Label><Select value={productId} onChange={setProductId} placeholder="選択..." options={products.map((p) => ({ value: p.id, label: p.name }))} /></div>
              <div><Label>仕向国</Label><CountryTabs selected={countryId} onSelect={setCountryId} /></div>
              <div style={{ display: "flex", gap: "10px" }}>
                <div style={{ flex: 1 }}><Label>FOB単価（円）</Label><Input value={fobJPY} onChange={setFobJPY} placeholder="例: 300" type="number" /></div>
                <div style={{ flex: 1 }}><Label>数量（個）</Label><Input value={qty} onChange={setQty} placeholder="例: 1000" type="number" /></div>
              </div>
              <div style={{ display: "flex", gap: "10px" }}>
                <div style={{ flex: 1 }}><Label>輸送方法</Label><Select value={shipping} onChange={setShipping} options={[{ value: "sea", label: "🚢 海上" }, { value: "air", label: "✈️ 航空" }]} /></div>
                <div style={{ flex: 1 }}><Label>想定小売価格（USD等）</Label><Input value={retailPrice} onChange={setRetailPrice} placeholder="例: 4.99" type="number" /></div>
              </div>
            </div>
          </Card>
        }
        right={calc ? (
          <div>
            <Card style={{ background: "#FAFAF5" }}>
              <Label>📊 コスト内訳（為替: ¥{calc.rate}/{country.currency}）</Label>
              <div style={{ fontSize: "14px", lineHeight: 2.2 }}>
                {[
                  ["FOB単価", fmtUSD(calc.fobUSD) + `/個 × ${calc.units}個`, fmtUSD(calc.fobTotal)],
                  [`運賃（${shipping === "sea" ? "海上" : "航空"}）`, `${fmtUSD(shipping === "sea" ? settings.freight.seaPerUnit : settings.freight.airPerUnit)}/個`, fmtUSD(calc.freightTotal)],
                  [`保険料（${settings.insurance}%）`, "", fmtUSD(calc.insurance)],
                  ["CIF合計", "", fmtUSD(calc.cifTotal)],
                ].map(([l, d, v], i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", borderBottom: i === 3 ? "2px solid #333" : `1px solid ${C.border}`, paddingBottom: "2px" }}>
                    <span>{l} <span style={{ color: C.textMuted, fontSize: "12px" }}>{d}</span></span>
                    <span style={{ fontWeight: i === 3 ? 700 : 400, fontFamily: "monospace" }}>{v}</span>
                  </div>
                ))}
                <div style={{ marginTop: "6px" }}>
                  {[
                    [`関税（実効 ${calc.dutyRate.toFixed(1)}%）`, fmtUSD(calc.dutyAmount)],
                    ["通関手数料（Broker Fee）", fmtUSD(calc.brokerFee)],
                    ...(countryId === "us" ? [["MPF（Merchandise Processing Fee）", fmtUSD(calc.mpf)], ...(shipping === "sea" ? [["HMF（Harbor Maintenance Fee）", fmtUSD(calc.hmf)]] : [])] : []),
                  ].map(([l, v], i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", borderBottom: `1px solid ${C.border}`, paddingBottom: "2px" }}>
                      <span>{l}</span><span style={{ fontFamily: "monospace" }}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </Card>
            <Card style={{ background: C.amberLight, border: `1px solid ${C.amberBorder}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: "16px", fontWeight: 700 }}>
                <span>Landed Cost 合計</span><span>{fmtUSD(calc.totalLanded)}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: "22px", fontWeight: 800, color: C.amber, marginTop: "6px" }}>
                <span>単価（着地）</span><span>{fmtUSD(calc.landedPerUnit)} / 個</span>
              </div>
              <div style={{ fontSize: "13px", color: "#744210", marginTop: "4px" }}>
                FOB {fmtJPY(parseFloat(fobJPY))} → 着地 {fmtJPY(calc.landedPerUnit * calc.rate)}（{((calc.landedPerUnit / calc.fobUSD - 1) * 100).toFixed(1)}% 増）
              </div>
            </Card>
            {calc.margin !== null && (
              <Card style={{ background: calc.margin > 50 ? C.greenBg : calc.margin > 30 ? C.amberLight : "#FFF5F5", border: `1px solid ${calc.margin > 50 ? C.greenBorder : calc.margin > 30 ? C.amberBorder : "#FED7D7"}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: "18px", fontWeight: 700, color: calc.margin > 50 ? C.green : calc.margin > 30 ? "#744210" : C.red }}>
                  <span>粗利率</span><span>{calc.margin.toFixed(1)}%</span>
                </div>
                <div style={{ fontSize: "13px", color: C.textLight, marginTop: "2px" }}>
                  {calc.margin > 50 ? "✅ 健全" : calc.margin > 30 ? "🟡 許容範囲" : "🔴 要見直し"}
                  （小売 {fmtUSD(parseFloat(retailPrice))} − 着地 {fmtUSD(calc.landedPerUnit)} = 利益 {fmtUSD(parseFloat(retailPrice) - calc.landedPerUnit)}）
                </div>
              </Card>
            )}
          </div>
        ) : (
          <Card style={{ background: C.grayLight, textAlign: "center", padding: "60px 20px" }}>
            <div style={{ fontSize: "14px", color: C.textMuted }}>← 左のフォームに入力するとコスト内訳が表示されます</div>
          </Card>
        )}
      />
    </div>
  );
};

const DocGenerator = ({ settings = DEFAULT_SETTINGS, products = PRODUCT_DATABASE, initialProduct = "", initialCountry = "us" }) => {
  const [productId, setProductId] = useState(initialProduct);
  const [countryId, setCountryId] = useState(initialCountry);
  useEffect(() => { setProductId(initialProduct); }, [initialProduct]);
  useEffect(() => { setCountryId(initialCountry); }, [initialCountry]);
  const [consignee, setConsignee] = useState("");
  const [fob, setFob] = useState("");
  const [qty, setQty] = useState("");
  const [shipping, setShipping] = useState("sea");
  const [invoiceNo, setInvoiceNo] = useState(`ORZ-${new Date().getFullYear()}${String(new Date().getMonth() + 1).padStart(2, "0")}-001`);
  const [generated, setGenerated] = useState(null);

  const product = products.find((p) => p.id === productId);
  const country = COUNTRIES.find((c) => c.id === countryId);

  const generate = () => {
    if (!product || !country) return;

Name:

    const pl = `PACKING LIST

Date: ${today}

SHIPPER: ${SHIPPER.name}
CONSIGNEE: ${consignee || "[Consignee Name & Address]"}

Quantity: ${fmt(qtyVal)} units

${invoiceNo}

${product.nameEn}
${country.name}`;

    const pn = countryId === "us" ? `PRIOR NOTICE DATA (FDA)
═══════════════════════════════════════

Article Name: ${product.nameEn}

FDA Registration #: ${SHIPPER.fda_registration}
Shipper: ${SHIPPER.name}
Consignee (US): ${consignee || "[Consignee]"}

    setGenerated({ ci, pl, pn });

  const DocDisplay = ({ title, content }) => {

// ORIGIN DETERMINATION
// ============================================================
const OriginDetermination = ({ products = PRODUCT_DATABASE, initialProduct = "" }) => {
  const [productId, setProductId] = useState(initialProduct);
  useEffect(() => { setProductId(initialProduct); }, [initialProduct]);
  const product = products.find((p) => p.id === productId);

  const calcRVC = (materials) => {
    if (!materials) return null;
    const totalMaterialValue = materials.reduce((s, m) => s + m.value, 0);
    const fobEstimate = totalMaterialValue * 2.5;
    const nonOriginValue = materials.filter((m) => m.origin !== "JP").reduce((s, m) => s + m.value, 0);
    const rvc = ((fobEstimate - nonOriginValue) / fobEstimate) * 100;
    return { rvc, totalMaterialValue, fobEstimate, nonOriginValue };
  };

  const checkCTH = (materials, productHs) => {
    if (!materials) return null;
    const prodHead = productHs.substring(0, 4);
    const nonOrigin = materials.filter((m) => m.origin !== "JP");
    const allChanged = nonOrigin.every((m) => m.hsCode.substring(0, 4) !== prodHead);
    return { passed: allChanged, nonOrigin, prodHead };
  };

  const rvcResult = product ? calcRVC(product.materials) : null;
  const cthResult = product ? checkCTH(product.materials, product.hsCode) : null;

  return (
    <div>
      <SectionHeader sub="EPA/CPTPP/RCEPの原産地基準充足を自動判定">🌾 原産地判定ワークシート</SectionHeader>
      <div style={{ maxWidth: "400px", marginBottom: "16px" }}>
        <Select value={productId} onChange={setProductId} placeholder="製品を選択..." options={products.filter((p) => p.materials).map((p) => ({ value: p.id, label: p.name }))} />
      </div>
      {product && product.materials && (
        <TwoCol ratio="1fr 1fr"
          left={
            <div>
              <Card>
                <Label>📦 原材料構成（HS: {product.hsCode}）</Label>
                <div style={{ fontSize: "13px" }}>
                  {product.materials.map((m, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.border}` }}>
                      <span>{m.origin === "JP" ? "🇯🇵" : "🌐"} {m.name} ({m.hsCode})</span>
                      <span style={{ color: m.origin === "JP" ? C.green : C.red, fontWeight: 600 }}>{m.origin} — ¥{m.value}</span>
                    </div>
                  ))}
                </div>
              </Card>
              <Card>
                <Label>🔍 CTH判定（関税番号変更基準）</Label>
                {cthResult && (
                  <div>
                    <div style={{ fontSize: "13px", lineHeight: 1.7 }}>
                      製品HS上4桁: <strong>{cthResult.prodHead}</strong><br />
                      非原産材料: {cthResult.nonOrigin.length === 0 ? "なし（全て日本原産）" : cthResult.nonOrigin.map((m) => `${m.name}(${m.hsCode.substring(0, 4)})`).join(", ")}
                    </div>
                    <div style={{ marginTop: "8px", padding: "10px", borderRadius: "6px", background: cthResult.passed ? C.greenBg : "#FFF5F5", border: `1px solid ${cthResult.passed ? C.greenBorder : "#FED7D7"}` }}>
                      <span style={{ fontSize: "14px", fontWeight: 700, color: cthResult.passed ? C.green : C.red }}>{cthResult.passed ? "✅ CTH基準 充足" : "❌ CTH基準 不充足"}</span>
                    </div>
                  </div>
                )}
              </Card>
            </div>
          }
          right={
            <div>
              <Card>
                <Label>📊 RVC判定（付加価値基準）</Label>
                {rvcResult && (
                  <div>
                    <div style={{ fontSize: "13px", lineHeight: 2 }}>
                      FOB推定額: ¥{rvcResult.fobEstimate}<br />
                      非原産材料額: ¥{rvcResult.nonOriginValue}<br />
                      <strong>RVC = {rvcResult.rvc.toFixed(1)}%</strong>
                    </div>
                    <div style={{ marginTop: "10px" }}>
                      {Object.entries(ORIGIN_RULES).map(([key, rule]) => {
                        const passed = rvcResult.rvc >= rule.threshold;
                        return (
                          <div key={key} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 12px", marginBottom: "6px", borderRadius: "6px", background: passed ? C.greenBg : "#FFF5F5", border: `1px solid ${passed ? C.greenBorder : "#FED7D7"}` }}>
                            <span style={{ fontSize: "13px" }}>{rule.name}（{rule.threshold}%以上）</span>
                            <span style={{ fontSize: "13px", fontWeight: 700, color: passed ? C.green : C.red }}>{passed ? "✅ 充足" : "❌ 不足"}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </Card>
              <Card style={{ background: C.blueBg, border: `1px solid ${C.blueBorder}` }}>
                <Label>📋 総合判定</Label>
                <div style={{ fontSize: "13px", lineHeight: 2, color: C.blue }}>
                  {Object.entries(ORIGIN_RULES).map(([key, rule]) => {
                    const rvcPass = rvcResult && rvcResult.rvc >= rule.threshold;
                    const cthPass = cthResult?.passed;
                    const eligible = rvcPass || cthPass;
                    return <div key={key}>{eligible ? "✅" : "❌"} {rule.name}: {eligible ? "特恵税率適用可（" + (cthPass ? "CTH" : "RVC") + "基準充足）" : "特恵税率適用不可"}</div>;
                  })}
                </div>
              </Card>
            </div>
          }
        />
      )}
    </div>
  );
};

const SettingsPanel = ({ settings, onUpdate, apiKey = "", onApiKeyChange }) => {
  const [pdfStatus, setPdfStatus] = useState(null);
  const [pdfParsed, setPdfParsed] = useState(null);
  const u = (path, val) => {
    const s = JSON.parse(JSON.stringify(settings));
    const keys = path.split(".");
    let obj = s;
    for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
    obj[keys[keys.length - 1]] = parseFloat(val) || 0;
    onUpdate(s);
  };
  const SettingRow = ({ label, path, unit }) => (
    <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "8px" }}>
      <div style={{ flex: 1, fontSize: "14px", color: C.text }}>{label}</div>
      <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
        <input type="number" value={settings[path.split(".")[0]]?.[path.split(".")[1]] ?? path.split(".").reduce((o, k) => o?.[k], settings) ?? ""} onChange={(e) => u(path, e.target.value)} style={{ width: "100px", padding: "8px 10px", border: `1px solid ${C.border}`, borderRadius: "6px", fontSize: "14px", textAlign: "right", fontFamily: "monospace", color: C.text }} />
        {unit && <span style={{ fontSize: "13px", color: C.textLight, minWidth: "30px" }}>{unit}</span>}
      </div>
    </div>
  );
  const SGroup = ({ title, children }) => (
    <div style={{ marginBottom: "20px" }}>
      <div style={{ fontSize: "14px", fontWeight: 700, color: "#744210", marginBottom: "10px", paddingBottom: "6px", borderBottom: `1px solid ${C.amberBorder}` }}>{title}</div>
      {children}
    </div>
  );

  const handlePdfUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setPdfStatus("reading");
    setPdfParsed(null);
    try {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej(new Error("ファイル読み込み失敗"));
        r.readAsDataURL(file);
      });
      setPdfStatus("parsing");
      const mimeType = file.type || "application/pdf";
      if (!apiKey) { setPdfStatus("nokey"); return; }
      const sysPrompt = `You extract freight/logistics cost data from shipping quotes and invoices. Return ONLY valid JSON (no markdown, no backticks, no preamble). Extract whatever you can find. Use this exact schema:
{"sea_per_unit":null,"air_per_unit":null,"insurance_pct":null,"broker_fee_usd":null,"fx_usd":null,"fx_eur":null,"fx_gbp":null,"notes":"brief description of what was found"}
Use null for values not found. For per-unit freight: divide total freight by quantity if both are present. All monetary values in USD. Insurance as percentage (e.g. 0.5 for 0.5%).`;
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: sysPrompt }] },
          contents: [{ parts: [{ inlineData: { mimeType, data: base64 } }, { text: "この見積書/請求書から輸送コスト・為替レート等のデータを抽出してJSON形式で返してください。" }] }],
        }),
      });
      const data = await resp.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const cleaned = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(cleaned);
      setPdfParsed(parsed);
      setPdfStatus("done");
    } catch (err) {
      console.error(err);
      setPdfStatus("error");
    }
  };

  const applyParsed = () => {
    if (!pdfParsed) return;
    const s = JSON.parse(JSON.stringify(settings));
    if (pdfParsed.sea_per_unit != null) s.freight.seaPerUnit = pdfParsed.sea_per_unit;
    if (pdfParsed.air_per_unit != null) s.freight.airPerUnit = pdfParsed.air_per_unit;
    if (pdfParsed.insurance_pct != null) s.insurance = pdfParsed.insurance_pct;
    if (pdfParsed.broker_fee_usd != null) s.brokerFee.us = pdfParsed.broker_fee_usd;
    if (pdfParsed.fx_usd != null) s.fx.usd = pdfParsed.fx_usd;
    if (pdfParsed.fx_eur != null) s.fx.eur = pdfParsed.fx_eur;
    if (pdfParsed.fx_gbp != null) s.fx.gbp = pdfParsed.fx_gbp;
    onUpdate(s);
    setPdfParsed(null);
    setPdfStatus("applied");
  };

  return (
    <div>
      <SectionHeader sub="為替レート・輸送コスト・手数料をカスタマイズ。💵コスト / 📄書類タブに反映。">⚙️ コスト設定</SectionHeader>
      <TwoCol ratio="1fr 1fr"
        left={
          <div>
            <Card style={{ border: `2px dashed ${C.amberBorder}`, background: C.amberLight }}>
              <div style={{ fontSize: "14px", fontWeight: 700, marginBottom: "8px", color: "#744210" }}>📎 見積書から自動読み込み</div>
              <div style={{ fontSize: "13px", color: "#744210", marginBottom: "12px", lineHeight: 1.6 }}>フォワーダーの見積書PDF（または画像）をアップロードすると、AIが運賃・保険・手数料等を自動抽出します。</div>
              <label style={{ display: "inline-flex", alignItems: "center", gap: "8px", padding: "10px 20px", background: "#fff", border: `1.5px solid ${C.amberBorder}`, borderRadius: "8px", cursor: "pointer", fontSize: "13px", fontWeight: 600, color: "#744210" }}>
                📄 ファイルを選択
                <input type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" onChange={handlePdfUpload} style={{ display: "none" }} />
              </label>
              <div style={{ fontSize: "12px", color: C.textMuted, marginTop: "6px" }}>PDF / PNG / JPG に対応</div>

const ProductCard = ({ product, expanded, onToggle, onSelectCountry }) => {

  return (
    <div style={{ border: expanded ? `2px solid ${C.amber}` : `1px solid ${C.border}`, borderRadius: "10px", overflow: "hidden", background: C.white, marginBottom: "10px", boxShadow: expanded ? "0 2px 8px rgba(0,0,0,0.06)" : "none" }}>
      <div onClick={onToggle} style={{ padding: "14px 18px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: "15px", fontWeight: 700, color: C.text }}>{product.name}</div>
          <div style={{ fontSize: "13px", color: C.textLight }}>{product.nameEn}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontFamily: "monospace", fontWeight: 700, fontSize: "16px", color: C.amber }}>{product.hsCode}</div>
          <div style={{ fontSize: "11px", color: C.textMuted }}>HTS: {product.htsUs}</div>
        </div>
      </div>
      {expanded && (
        <div style={{ padding: "0 18px 14px", borderTop: `1px solid ${C.border}` }}>
          <div style={{ fontSize: "13px", color: C.textLight, lineHeight: 1.6, margin: "10px 0" }}>{product.description}</div>

          {product.factors?.length > 0 && (
            <div style={{ marginTop: "8px" }}>
              <div style={{ fontSize: "12px", fontWeight: 700, color: C.textLight, marginBottom: "4px" }}>分類に影響する要素:</div>

                const s = lk[alt.likelihood] || lk.low;
                return (
                  <div key={i} style={{ padding: "8px 12px", border: `1px solid ${C.border}`, borderRadius: "6px", marginTop: "6px" }}>

          </div>
        </div>
      )}
    </div>
  );
};

const ProductManager = ({ customProducts, onUpdate, builtIn = PRODUCT_DATABASE, apiKey = "" }) => {
  const [editing, setEditing] = useState(null); // null = list view, "new" = new, id = edit
  const [form, setForm] = useState(JSON.parse(JSON.stringify(EMPTY_PRODUCT)));
  const [openSections, setOpenSections] = useState({ basic: true });
  const [allergenInput, setAllergenInput] = useState("");
  const [tagInput, setTagInput] = useState("");
  const [pdfStatus, setPdfStatus] = useState(null);

  const toggleSection = (s) => setOpenSections(o => ({ ...o, [s]: !o[s] }));
  const uf = (key, val) => setForm(f => ({ ...f, [key]: val }));
  const un = (key, val) => setForm(f => ({ ...f, nutrition: { ...(f.nutrition || {}), [key]: val } }));

  const startNew = () => {
    setForm(JSON.parse(JSON.stringify(EMPTY_PRODUCT)));
    setAllergenInput("");
    setTagInput("");
    setEditing("new");
    setOpenSections({ basic: true });
  };

  const startEdit = (p) => {
    setForm(JSON.parse(JSON.stringify(p)));
    setAllergenInput(p.nutrition?.allergens?.join(", ") || "");
    setTagInput(p.tags?.join(", ") || "");
    setEditing(p.id);
    setOpenSections({ basic: true });
  };

  const save = () => {
    const p = { ...form };
    if (!p.name || !p.hsCode) return;
    if (!p.id) p.id = "custom_" + Date.now();
    p.tags = tagInput.split(",").map(t => t.trim()).filter(Boolean);
    if (p.nutrition) {
      p.nutrition.allergens = allergenInput.split(",").map(a => a.trim().toLowerCase()).filter(Boolean);
    }
    // Ensure numeric fields are numbers
    if (p.nutrition) {
      NUTRITION_FIELDS.forEach(f => {
        if (f.type === "number" && p.nutrition[f.key] !== undefined) {
          p.nutrition[f.key] = parseFloat(p.nutrition[f.key]) || 0;
        }
      });
    }
    const existing = customProducts.findIndex(cp => cp.id === p.id);
    if (existing >= 0) {
      const updated = [...customProducts];
      updated[existing] = p;
      onUpdate(updated);
    } else {
      onUpdate([...customProducts, p]);
    }
    setEditing(null);
  };

  const remove = (id) => { onUpdate(customProducts.filter(p => p.id !== id)); };

  const addMaterial = () => {
    setForm(f => ({ ...f, materials: [...(f.materials || []), { name: "", hsCode: "", origin: "JP", value: 0 }] }));
  };
  const updateMaterial = (idx, key, val) => {
    setForm(f => {
      const m = [...(f.materials || [])];
      m[idx] = { ...m[idx], [key]: key === "value" ? (parseFloat(val) || 0) : val };
      return { ...f, materials: m };
    });
  };
  const removeMaterial = (idx) => {
    setForm(f => ({ ...f, materials: (f.materials || []).filter((_, i) => i !== idx) }));
  };

  const handlePdfUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setPdfStatus("parsing");
    try {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej(new Error("Read failed"));
        r.readAsDataURL(file);
      });
      const mimeType = file.type || "application/pdf";
      if (!apiKey) { setPdfStatus("nokey"); return; }
      const sysPrompt = `Extract product data from this spec sheet/label. Return ONLY valid JSON with this schema:
{"name":"日本語名","nameEn":"English name","hsCode":"XXXX.XX","htsUs":"XXXX.XX.XXXX","description":"説明","nutrition":{"servingsPerContainer":0,"servingSize":"","calories":0,"totalFat":0,"saturatedFat":0,"transFat":0,"cholesterol":0,"sodium":0,"totalCarb":0,"dietaryFiber":0,"totalSugars":0,"addedSugars":0,"protein":0,"vitD":0,"calcium":0,"iron":0,"potassium":0,"ingredients":"","allergens":["soy"],"allergenNote":"","netWeight":"","netWeightG":0}}
Use null for nutrition if not found. Use empty string for missing text fields, 0 for missing numbers.`;
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: sysPrompt }] },
          contents: [{ parts: [{ inlineData: { mimeType, data: base64 } }, { text: "この製品スペックシート/ラベルからデータを抽出してください。" }] }],
        }),
      });
      const data = await resp.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      setForm(f => ({
        ...f,
        name: parsed.name || f.name,
        nameEn: parsed.nameEn || f.nameEn,
        hsCode: parsed.hsCode || f.hsCode,
        htsUs: parsed.htsUs || f.htsUs,
        description: parsed.description || f.description,
        nutrition: parsed.nutrition || f.nutrition,
      }));
      if (parsed.nutrition?.allergens) setAllergenInput(parsed.nutrition.allergens.join(", "));
      setPdfStatus("done");
    } catch (err) {
      console.error(err);
      setPdfStatus("error");
    }
  };

  const Section = ({ id, title, children }) => (
    <div style={{ border: `1px solid ${C.border}`, borderRadius: "8px", marginBottom: "10px", overflow: "hidden" }}>
      <div onClick={() => toggleSection(id)} style={{ padding: "10px 14px", background: C.grayLight, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: "14px", fontWeight: 700, color: C.text }}>{title}</span>
        <span style={{ color: C.textMuted }}>{openSections[id] ? "▲" : "▼"}</span>
      </div>
      {openSections[id] && <div style={{ padding: "14px" }}>{children}</div>}
    </div>
  );

  const Field = ({ label, value, onChange, type = "text", placeholder = "", wide }) => (
    <div style={{ marginBottom: "8px", flex: wide ? "1 1 100%" : "1 1 48%" }}>
      <div style={{ fontSize: "12px", fontWeight: 600, color: C.textLight, marginBottom: "3px" }}>{label}</div>
      {type === "textarea" ? (
        <textarea value={value || ""} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={3} style={{ width: "100%", padding: "8px 10px", border: `1px solid ${C.border}`, borderRadius: "6px", fontSize: "13px", boxSizing: "border-box", resize: "vertical", fontFamily: "inherit" }} />
      ) : (
        <input type={type} value={value ?? ""} onChange={e => onChange(type === "number" ? e.target.value : e.target.value)} placeholder={placeholder} style={{ width: "100%", padding: "8px 10px", border: `1px solid ${C.border}`, borderRadius: "6px", fontSize: "13px", boxSizing: "border-box" }} />
      )}
    </div>
  );

  // LIST VIEW
  if (!editing) return (
    <div>
      <SectionHeader sub={`登録済み ${builtIn.length + customProducts.length}品目（プリセット${builtIn.length} + カスタム${customProducts.length}）`}>📦 製品管理</SectionHeader>
      <div style={{ marginBottom: "16px" }}><Btn primary onClick={startNew}>＋ 新規製品を追加</Btn></div>
      {customProducts.length > 0 && (
        <div style={{ marginBottom: "20px" }}>
          <Label>カスタム製品</Label>
          {customProducts.map(p => (
            <Card key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 18px" }}>
              <div>
                <div style={{ fontSize: "14px", fontWeight: 700 }}>{p.name} <span style={{ color: C.textLight, fontWeight: 400 }}>{p.nameEn}</span></div>
                <div style={{ fontSize: "12px", color: C.textLight, fontFamily: "monospace" }}>HS: {p.hsCode} {p.htsUs ? `/ HTS: ${p.htsUs}` : ""}</div>
                <div style={{ display: "flex", gap: "4px", marginTop: "4px" }}>
                  {p.nutrition && <Pill color={C.green} bg={C.greenBg} border={C.greenBorder}>FDA栄養✓</Pill>}
                  {p.materials?.length > 0 && <Pill color={C.blue} bg={C.blueBg} border={C.blueBorder}>原材料✓</Pill>}
                </div>
              </div>
              <div style={{ display: "flex", gap: "6px" }}>
                <Btn small onClick={() => startEdit(p)}>✏️ 編集</Btn>
                <Btn small onClick={() => remove(p.id)} style={{ color: C.red }}>🗑️</Btn>
              </div>
            </Card>
          ))}
        </div>
      )}
      <Label>プリセット製品（読み取り専用）</Label>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: "8px" }}>
        {builtIn.map(p => (
          <div key={p.id} style={{ padding: "10px 14px", border: `1px solid ${C.border}`, borderRadius: "8px", background: C.grayLight }}>
            <div style={{ fontSize: "13px", fontWeight: 600 }}>{p.name}</div>
            <div style={{ fontSize: "12px", color: C.textLight, fontFamily: "monospace" }}>{p.hsCode}</div>
          </div>
        ))}
      </div>
    </div>
  );

  // EDIT / NEW VIEW
  return (
    <div>
      <SectionHeader sub={editing === "new" ? "新規製品を登録" : `${form.name} を編集中`}>📦 {editing === "new" ? "製品追加" : "製品編集"}</SectionHeader>

      {/* PDF Upload */}
      <Card style={{ border: `2px dashed ${C.amberBorder}`, background: C.amberLight, marginBottom: "16px" }}>
        <div style={{ fontSize: "14px", fontWeight: 700, color: "#744210", marginBottom: "6px" }}>📎 スペックシートから自動入力</div>
        <div style={{ fontSize: "13px", color: "#744210", marginBottom: "10px" }}>製品仕様書やラベル画像をアップロードすると、AIが商品名・HS番号・栄養成分等を自動抽出してフォームに入力します。</div>
        <label style={{ display: "inline-flex", alignItems: "center", gap: "8px", padding: "8px 16px", background: "#fff", border: `1.5px solid ${C.amberBorder}`, borderRadius: "8px", cursor: "pointer", fontSize: "13px", fontWeight: 600, color: "#744210" }}>
          📄 ファイルを選択
          <input type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" onChange={handlePdfUpload} style={{ display: "none" }} />
        </label>
        <span style={{ fontSize: "12px", color: C.textMuted, marginLeft: "8px" }}>PDF / PNG / JPG</span>
        {pdfStatus === "parsing" && <div style={{ fontSize: "13px", color: C.amber, marginTop: "8px" }}>🤖 AI解析中...（10〜30秒）</div>}
        {pdfStatus === "done" && <div style={{ fontSize: "13px", color: C.green, marginTop: "8px" }}>✅ フォームに反映しました。内容を確認・修正して保存してください。</div>}
        {pdfStatus === "error" && <div style={{ fontSize: "13px", color: C.red, marginTop: "8px" }}>❌ 読み取り失敗。別のファイルを試してください。</div>}
        {pdfStatus === "nokey" && <div style={{ fontSize: "13px", color: C.red, marginTop: "8px" }}>🔑 APIキーが未設定です。⚙️設定タブの「API設定」にGemini APIキーを入力してください。</div>}
      </Card>

      <TwoCol ratio="1fr 1fr"
        left={
          <div>
            <Section id="basic" title="📋 基本情報（必須）">
              <div style={{ display: "flex", flexWrap: "wrap", gap: "0 12px" }}>
                <Field label="商品名（日本語）" value={form.name} onChange={v => uf("name", v)} placeholder="KOJIPOP 発酵リカバリーソーダ" wide />
                <Field label="商品名（英語）" value={form.nameEn} onChange={v => uf("nameEn", v)} placeholder="KOJIPOP Fermented Recovery Soda" wide />
                <Field label="HS番号（6桁）" value={form.hsCode} onChange={v => uf("hsCode", v)} placeholder="2202.10" />
                <Field label="HTS-US番号（10桁）" value={form.htsUs} onChange={v => uf("htsUs", v)} placeholder="2202.10.0000" />
                <Field label="説明" value={form.description} onChange={v => uf("description", v)} type="textarea" placeholder="製品の概要説明" wide />
                <Field label="注意事項" value={form.notes} onChange={v => uf("notes", v)} type="textarea" placeholder="分類上の留意点など" wide />
                <Field label="タグ（カンマ区切り）" value={tagInput} onChange={setTagInput} placeholder="飲料, 炭酸, 発酵" wide />
              </div>
            </Section>

            <Section id="materials" title="🌾 原材料構成（原産地判定用）">
              <Tip>EPA/FTA特恵税率の適格性を判定するために使います。不要なら空欄でOK。</Tip>
              {(form.materials || []).map((m, i) => (
                <div key={i} style={{ display: "flex", gap: "6px", alignItems: "end", marginBottom: "6px", flexWrap: "wrap" }}>
                  <Field label="原材料名" value={m.name} onChange={v => updateMaterial(i, "name", v)} placeholder="米麹" />
                  <Field label="HS番号" value={m.hsCode} onChange={v => updateMaterial(i, "hsCode", v)} placeholder="1104.29" />
                  <div style={{ marginBottom: "8px" }}>
                    <div style={{ fontSize: "12px", fontWeight: 600, color: C.textLight, marginBottom: "3px" }}>原産国</div>
                    <select value={m.origin} onChange={e => updateMaterial(i, "origin", e.target.value)} style={{ padding: "8px", border: `1px solid ${C.border}`, borderRadius: "6px", fontSize: "13px" }}>
                      <option value="JP">🇯🇵 JP</option><option value="CN">🇨🇳 CN</option><option value="TH">🇹🇭 TH</option><option value="US">🇺🇸 US</option><option value="other">🌐 Other</option>
                    </select>
                  </div>
                  <Field label="金額(¥)" value={m.value} onChange={v => updateMaterial(i, "value", v)} type="number" placeholder="100" />
                  <button onClick={() => removeMaterial(i)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "16px", color: C.red, marginBottom: "12px" }}>✕</button>
                </div>
              ))}
              <Btn small onClick={addMaterial}>＋ 原材料を追加</Btn>
            </Section>
          </div>
        }
        right={
          <div>
            <Section id="nutrition" title="🏷️ FDA栄養成分（ラベル生成用）">
              <Tip>FDAラベル自動生成に使います。入力するとFDAラベルタブで利用可能に。不要なら空欄でOK。</Tip>
              <div style={{ marginBottom: "8px" }}>
                <Btn small onClick={() => setForm(f => ({ ...f, nutrition: f.nutrition ? null : {} }))}>
                  {form.nutrition ? "❌ 栄養データを削除" : "＋ 栄養データを追加"}
                </Btn>
              </div>
              {form.nutrition && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: "0 12px" }}>
                  {NUTRITION_FIELDS.map(f => (
                    <Field key={f.key} label={f.label} value={form.nutrition[f.key]} onChange={v => un(f.key, v)} type={f.type || "text"} placeholder={f.placeholder || ""} wide={f.type === "textarea"} />
                  ))}
                  <Field label="アレルゲン（カンマ区切り）" value={allergenInput} onChange={setAllergenInput} placeholder="soy, wheat" wide />
                </div>
              )}
            </Section>
          </div>
        }
      />

      <div style={{ display: "flex", gap: "10px", marginTop: "16px", justifyContent: "flex-end" }}>
        <Btn onClick={() => setEditing(null)}>キャンセル</Btn>
        <Btn primary onClick={save} style={{ opacity: form.name && form.hsCode ? 1 : 0.5 }}>💾 {editing === "new" ? "製品を登録" : "変更を保存"}</Btn>
      </div>
    </div>
  );
};

function ORYZAEExportTool() {
  const [mode, setMode] = useState("dashboard");
  const [searchQuery, setSearchQuery] = useState("");
  const [expandedProduct, setExpandedProduct] = useState(null);
  const [expandedAlerts, setExpandedAlerts] = useState({});
  const [decisionAnswers, setDecisionAnswers] = useState({});
  const [decisionResult, setDecisionResult] = useState(null);
  const [thresholdProduct, setThresholdProduct] = useState(null);
  const [thresholdValues, setThresholdValues] = useState({});
  const [guideOpen, setGuideOpen] = useState({});

  // Safe storage: in-memory fallback when localStorage unavailable (e.g. artifact iframe)
  const _mem = React.useRef({});
  const _ls = (fn) => { try { return fn(); } catch { return null; } };
  const sGet = (k, d) => _ls(() => localStorage.getItem(k)) || _mem.current[k] || d;
  const sGetJ = (k, d) => { const v = _ls(() => localStorage.getItem(k)) || _mem.current[k]; if (v) { try { return JSON.parse(v); } catch {} } return d; };
  const sSet = (k, v) => { const s = typeof v === "string" ? v : JSON.stringify(v); _mem.current[k] = s; _ls(() => localStorage.setItem(k, s)); };
  const ssGet = (k, d) => _ls(() => sessionStorage.getItem(k)) || _mem.current["$"+k] || d;
  const ssSet = (k, v) => { _mem.current["$"+k] = v; _ls(() => sessionStorage.setItem(k, v)); };

  const [globalProductId, setGlobalProductId] = useState(() => sGet("orz_product", ""));
  const [globalCountryId, setGlobalCountryId] = useState(() => sGet("orz_country", "us"));
  const [settings, setSettings] = useState(() => sGetJ("orz_settings", JSON.parse(JSON.stringify(DEFAULT_SETTINGS))));
  const [customProducts, setCustomProducts] = useState(() => sGetJ("orz_custom_products", []));
  const [apiKey, setApiKey] = useState(() => ssGet("orz_apikey", ""));
  const [timelineChecks, setTimelineChecks] = useState(() => sGetJ("orz_timeline", {}));

  useEffect(() => { sSet("orz_product", globalProductId); }, [globalProductId]);
  useEffect(() => { sSet("orz_country", globalCountryId); }, [globalCountryId]);
  useEffect(() => { sSet("orz_settings", JSON.stringify(settings)); }, [settings]);
  useEffect(() => { sSet("orz_custom_products", JSON.stringify(customProducts)); }, [customProducts]);
  useEffect(() => { ssSet("orz_apikey", apiKey); }, [apiKey]);
  useEffect(() => { sSet("orz_timeline", JSON.stringify(timelineChecks)); }, [timelineChecks]);

  const allProducts = useMemo(() => [...PRODUCT_DATABASE, ...customProducts], [customProducts]);

  const selCountry = COUNTRIES.find((c) => c.id === selectedCountry);
  const filtered = searchQuery.trim()
    ? allProducts.filter((p) => { const q = searchQuery.toLowerCase(); return p.name.toLowerCase().includes(q) || p.nameEn.toLowerCase().includes(q) || p.hsCode.includes(q) || p.htsUs.includes(q) || p.tags.some((t) => t.includes(q)) || p.examples.some((e) => e.toLowerCase().includes(q)); })
    : allProducts;

  const currentQuestion = DECISION_QUESTIONS.find((q) => { if (decisionAnswers[q.id] !== undefined) return false; if (q.condition && !q.condition(decisionAnswers)) return false; return true; });

  const getDecisionResult = useCallback(() => {
    const a = decisionAnswers;
    if (a.form === "liquid_drink" && a.alcohol === "high") return "fermented_drink_alc";
    if (a.form === "liquid_drink" && a.alcohol === "low" && a.carbonation === "yes") return "kojipop";
    if (a.form === "liquid_drink" && a.alcohol === "low" && a.carbonation === "no") return "amazake_beverage";
    if (a.primary_function === "sweetener" && a.form === "liquid_seasoning") return "sweetener_liquid";
    if (a.primary_function === "sweetener" && a.form === "powder") return "sweetener_powder";
    if (a.primary_function === "sweetener" && a.form === "paste") return "amazake_concentrate";
    if (a.primary_function === "seasoning") return "koji_seasoning";
    if (a.primary_function === "ingredient" && a.form === "powder") return "rice_koji_raw";
    if (a.primary_function === "ingredient") return "koji_enzyme";
    if (a.primary_function === "functional") return "fermented_paste";
    if (a.form === "solid") return "granola";
    if (a.form === "capsule") return "koji_enzyme";
    return null;
  }, [decisionAnswers]);

    { key: "fda_label", icon: "🏷️", label: "FDAラベル" },
    { key: "landed", icon: "💵", label: "コスト計算" },
    { key: "docgen", icon: "📄", label: "書類生成" },
    { key: "origin", icon: "🌾", label: "原産地判定" },
    { key: "timeline", icon: "⏱️", label: "タイムライン" },
    { key: "docs", icon: "📋", label: "必要書類" },
    { key: "threshold", icon: "⚖️", label: "閾値判定" },
    { divider: true },
    { key: "products", icon: "📦", label: "製品管理" },
    { key: "settings", icon: "⚙️", label: "設定" },
    { key: "guide", icon: "📖", label: "使い方" },
  ];

  return (
    <div style={{ fontFamily: font, display: "flex", minHeight: "100%", background: C.bg }}>
      {/* SIDEBAR */}
      <div style={{ width: "180px", background: C.sidebar, display: "flex", flexDirection: "column", flexShrink: 0, minHeight: "100%" }}>
        <div style={{ padding: "20px 18px 16px" }}>
          <div style={{ fontSize: "15px", fontWeight: 800, color: "#fff", letterSpacing: "-0.02em" }}>ORYZAE</div>
          <div style={{ fontSize: "11px", fontWeight: 600, color: "#D4A574", marginTop: "1px" }}>Export Ops v3.0</div>
        </div>
        {/* GLOBAL SELECTORS */}
        <div style={{ padding: "0 10px 10px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
          <select value={globalProductId} onChange={e => setGlobalProductId(e.target.value)} style={{ width: "100%", padding: "6px 8px", borderRadius: "6px", border: "1px solid rgba(255,255,255,0.15)", background: "#2D2A22", color: "#F0D38A", fontSize: "11px", marginBottom: "6px", cursor: "pointer" }}>
            <option value="">-- 製品を選択 --</option>

          </select>
          <div style={{ display: "flex", gap: "3px" }}>
            {COUNTRIES.map(c => (
              <button key={c.id} onClick={() => setGlobalCountryId(c.id)} style={{ flex: 1, padding: "4px 0", border: globalCountryId === c.id ? "1.5px solid #F0D38A" : "1px solid rgba(255,255,255,0.1)", borderRadius: "4px", background: globalCountryId === c.id ? "#3D3826" : "transparent", color: globalCountryId === c.id ? "#F0D38A" : "rgba(255,255,255,0.4)", fontSize: "13px", cursor: "pointer", textAlign: "center" }}>{c.flag}</button>
            ))}

      </div>

      {/* MAIN CONTENT */}
      <div style={{ flex: 1, minWidth: 0, overflowY: "auto" }}>
        <div style={{ padding: "24px 24px", maxWidth: "960px" }}>

          {/* DASHBOARD */}
          {mode === "dashboard" && (
            <div>
              <SectionHeader sub="最新の貿易規制アラートと市場動向">📊 ダッシュボード</SectionHeader>
              {globalProductId && (() => {
                const gp = allProducts.find(p => p.id === globalProductId);
                const gc = COUNTRIES.find(c => c.id === globalCountryId);
                if (!gp || !gc) return null;
                const tariff = gc.tariffs?.[gp.hsCode];
                const effectiveRate = gc.id === "us" ? ((tariff?.mfnNum || 0) + (gc.section122?.rateNum || 0)) : (tariff?.ftaNum ?? tariff?.mfnNum ?? 0);
                const hasFda = !!gp.nutrition;
                const hasMat = gp.materials?.length > 0;
                return (
                  <Card style={{ background: "linear-gradient(135deg, #FFFBF0 0%, #FFF9ED 100%)", border: "2px solid " + C.amberBorder, marginBottom: "16px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "10px" }}>
                      <div>
                        <div style={{ fontSize: "16px", fontWeight: 800, color: C.text }}>{gp.name}</div>
                        <div style={{ fontSize: "12px", color: C.textLight }}>{gp.nameEn} → {gc.flag} {gc.name}</div>
                      </div>
                      <div style={{ fontFamily: "monospace", fontSize: "16px", fontWeight: 800, color: C.amber }}>{gp.hsCode}</div>
                    </div>
                    <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginTop: "12px" }}>
                      {[
                        { label: "関税（実効）", value: effectiveRate.toFixed(1) + "%", color: effectiveRate > 5 ? "#744210" : C.green, sub: gc.id === "us" && tariff ? "MFN " + tariff.mfn + " + Sec122" : null },
                        { label: "HTS-US", value: gp.htsUs || "\u2014", mono: true },
                        { label: "FDAラベル", value: hasFda ? "\u2705 準備済" : "\u274c 未登録", color: hasFda ? C.green : C.red, bg: hasFda ? C.greenBg : "#FFF5F5", borderColor: hasFda ? C.greenBorder : "#FED7D7" },
                        { label: "原産地判定", value: hasMat ? "\u2705 判定可" : "\u2014 未登録", color: hasMat ? C.green : C.textMuted, bg: hasMat ? C.greenBg : C.grayLight, borderColor: hasMat ? C.greenBorder : C.border },
                      ].map((item, i) => (
                        <div key={i} style={{ flex: "1 1 100px", padding: "8px 12px", background: item.bg || C.white, borderRadius: "8px", border: "1px solid " + (item.borderColor || C.border) }}>
                          <div style={{ fontSize: "10px", color: C.textMuted }}>{item.label}</div>
                          <div style={{ fontSize: item.mono ? "12px" : "15px", fontWeight: 700, color: item.color || C.text, fontFamily: item.mono ? "monospace" : "inherit" }}>{item.value}</div>
                          {item.sub && <div style={{ fontSize: "10px", color: C.textMuted }}>{item.sub}</div>}
                        </div>
                      ))}
                    </div>
                    <div style={{ display: "flex", gap: "6px", marginTop: "10px", flexWrap: "wrap" }}>
                      <Btn small onClick={() => setMode("landed")}>💵 コスト試算</Btn>
                      <Btn small onClick={() => setMode("docgen")}>📄 書類生成</Btn>
                      {hasFda && <Btn small onClick={() => setMode("fda_label")}>🏷️ FDAラベル</Btn>}
                      <Btn small onClick={() => setMode("timeline")}>⏱️ タイムライン</Btn>
                    </div>
                  </Card>
                );
              })()}
              <TwoCol ratio="1fr 340px"
                left={
                  <div>
                    {US_TRADE_ALERTS.map((a) => <AlertBanner key={a.id} alert={a} expanded={expandedAlerts[a.id]} onToggle={() => setExpandedAlerts((e) => ({ ...e, [a.id]: !e[a.id] }))} />)}
                  </div>
                }
                right={
                  <div>
                    <Card style={{ background: C.greenBg, border: `1px solid ${C.greenBorder}` }}>
                      <div style={{ fontSize: "14px", fontWeight: 700, color: C.green, marginBottom: "4px" }}>✅ EU・英国・RCEP</div>
                      <div style={{ fontSize: "13px", color: C.green, lineHeight: 1.6 }}>安定稼働中。EU Novel Food非該当確認済み。UK BTOM完全施行。</div>
                    </Card>
                    <Card style={{ background: C.blueBg, border: `1px solid ${C.blueBorder}` }}>
                      <div style={{ fontSize: "14px", fontWeight: 700, color: C.blue, marginBottom: "4px" }}>ℹ️ KOJIPOP 米国市場への影響</div>
                      <div style={{ fontSize: "13px", color: C.blue, lineHeight: 1.6 }}>HS 2202.10: MFN 0.2¢/L + Section 122 10% = 実効約10%。de minimis恒久廃止（2027/7/1）でD2C小口も要フォーマルエントリー。</div>
                    </Card>
                    <Card>
                      <div style={{ fontSize: "14px", fontWeight: 700, color: C.text, marginBottom: "6px" }}>💱 現在の為替設定</div>
                      <div style={{ fontSize: "13px", color: C.textLight, lineHeight: 2 }}>
                        USD/JPY: <strong>¥{settings.fx.usd}</strong><br />
                        EUR/JPY: <strong>¥{settings.fx.eur}</strong><br />
                        GBP/JPY: <strong>¥{settings.fx.gbp}</strong>
                      </div>
                      <div style={{ marginTop: "8px" }}><Btn small onClick={() => setMode("settings")}>⚙️ 設定を変更</Btn></div>
                    </Card>
                  </div>
                }
              />
            </div>
          )}

          {/* CLASSIFY */}
          {mode === "classify" && (
            <div>
              <SectionHeader sub="商品名・HSコードで検索、またはディシジョンツリーで判定">🔍 HS分類 検索 & 判定</SectionHeader>
              <TwoCol ratio="1fr 380px"
                left={
                  <div>
                    <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="商品名・HSコード・キーワードで検索" style={{ width: "100%", padding: "12px 16px", border: `1px solid ${C.border}`, borderRadius: "8px", fontSize: "14px", marginBottom: "14px", boxSizing: "border-box", background: C.white }} />
                    {searchQuery.trim() ? (
                      <div>
                        <div style={{ fontSize: "13px", color: C.textLight, marginBottom: "8px" }}>{filtered.length}件の結果</div>
                        {filtered.map((p) => <ProductCard key={p.id} product={p} expanded={expandedProduct === p.id} onToggle={() => setExpandedProduct(expandedProduct === p.id ? null : p.id)} onSelectCountry={(cId) => { setSelectedCountry(cId); setMode("tariff"); }} />)}
                      </div>
                    ) : (
                      <div>
                        <div style={{ fontSize: "13px", color: C.textLight, marginBottom: "8px" }}>全{allProducts.length}品目</div>
                        {allProducts.map((p) => <ProductCard key={p.id} product={p} expanded={expandedProduct === p.id} onToggle={() => setExpandedProduct(expandedProduct === p.id ? null : p.id)} onSelectCountry={(cId) => { setSelectedCountry(cId); setMode("tariff"); }} />)}
                      </div>
                    )}
                  </div>
                }
                right={
                  <Card>
                    <Label>🌳 分類判定ツリー</Label>
                    {!decisionResult ? (currentQuestion ? (
                      <div>
                        <div style={{ display: "flex", gap: "6px", marginBottom: "10px", flexWrap: "wrap" }}>{Object.entries(decisionAnswers).map(([k, v]) => <Pill key={k} color={C.blue} bg={C.blueBg} border={C.blueBorder}>{v}</Pill>)}</div>
                        <div style={{ fontSize: "14px", fontWeight: 700, marginBottom: "10px" }}>Q: {currentQuestion.question}</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>{currentQuestion.options.map((o) => <button key={o.value} onClick={() => setDecisionAnswers((a) => ({ ...a, [currentQuestion.id]: o.value }))} style={{ padding: "10px 14px", border: `1px solid ${C.border}`, borderRadius: "8px", background: C.grayLight, cursor: "pointer", fontSize: "13px", textAlign: "left", transition: "background 0.15s" }}>{o.label}</button>)}</div>
                        {Object.keys(decisionAnswers).length > 0 && <button onClick={() => { setDecisionAnswers({}); setDecisionResult(null); }} style={{ marginTop: "10px", background: "none", border: "none", cursor: "pointer", fontSize: "13px", color: C.amber, fontWeight: 600 }}>↩ リセット</button>}
                      </div>
                    ) : <div style={{ textAlign: "center", color: C.textMuted, fontSize: "13px", padding: "20px" }}>判定中...<br /><button onClick={() => { setDecisionAnswers({}); setDecisionResult(null); }} style={{ background: "none", border: "none", cursor: "pointer", color: C.amber, fontWeight: 600, marginTop: "8px" }}>↩ リセット</button></div>
                    ) : (
                      <div>
                        <div style={{ background: C.greenBg, border: `1px solid ${C.greenBorder}`, borderRadius: "8px", padding: "12px", marginBottom: "10px" }}>
                          <div style={{ fontSize: "12px", fontWeight: 700, color: C.green }}>✅ 推奨分類</div>
                          <div style={{ fontSize: "20px", fontWeight: 700, fontFamily: "monospace", color: C.green }}>{decisionResult.hsCode}</div>
                          <div style={{ fontSize: "14px", fontWeight: 600, color: C.green }}>{decisionResult.name}</div>
                        </div>
                        <ProductCard product={decisionResult} expanded onToggle={() => {}} onSelectCountry={(cId) => { setSelectedCountry(cId); setMode("tariff"); }} />
                        <button onClick={() => { setDecisionAnswers({}); setDecisionResult(null); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "13px", color: C.amber, fontWeight: 600 }}>↩ もう一度判定</button>
                      </div>
                    )}
                  </Card>
                }
              />
            </div>
          )}

          {/* TARIFF */}
          {mode === "tariff" && (
            <div>
              <SectionHeader sub="国別のMFN税率・FTA特恵税率・追加関税">💰 国別関税率 & FTA</SectionHeader>
              <CountryTabs selected={selectedCountry} onSelect={setSelectedCountry} />
              {selCountry && (
                <TwoCol ratio="340px 1fr"
                  left={
                    <Card>
                      <div style={{ fontSize: "14px", fontWeight: 700, marginBottom: "6px" }}>{selCountry.flag} {selCountry.fta}</div>
                      <div style={{ fontSize: "13px", color: C.textLight, lineHeight: 1.6 }}>{selCountry.ftaNote}</div>
                      {selCountry.section122 && (
                        <div style={{ marginTop: "10px", padding: "10px", background: "#FFF5F5", borderRadius: "6px", border: "1px solid #FED7D7" }}>
                          <div style={{ fontSize: "13px", fontWeight: 700, color: "#9B2C2C" }}>Section 122: {selCountry.section122.rate}</div>
                          <div style={{ fontSize: "12px", color: "#9B2C2C", marginTop: "2px" }}>期限: {selCountry.section122.expiryDate}</div>
                        </div>
                      )}
                    </Card>
                  }
                  right={
                    <Card style={{ overflowX: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "13px", minWidth: "400px" }}>
                        <thead>
                          <tr>{["HS", "品目", "MFN", selCountry.id === "us" ? "Sec122" : "FTA", "実効税率"].map((h, i) => (
                            <th key={i} style={{ textAlign: "left", padding: "8px 10px", borderBottom: `2px solid ${C.border}`, fontWeight: 700, color: C.textLight, fontSize: "12px" }}>{h}</th>
                          ))}</tr>
                        </thead>
                        <tbody>
                          {Object.entries(selCountry.tariffs).map(([hs, t]) => {
                            const prod = allProducts.find((p) => p.hsCode === hs);
                            const isUs = selCountry.id === "us";
                            return (
                              <tr key={hs} style={{ borderBottom: `1px solid ${C.border}` }}>
                                <td style={{ padding: "8px 10px", fontFamily: "monospace", fontWeight: 600 }}>{hs}</td>
                                <td style={{ padding: "8px 10px" }}>{prod?.name || ""}</td>
                                <td style={{ padding: "8px 10px" }}>{t.mfn}</td>
                                <td style={{ padding: "8px 10px" }}>{isUs ? t.surcharge : t.fta}</td>
                                <td style={{ padding: "8px 10px", fontWeight: 700, color: isUs ? "#744210" : C.green }}>{isUs ? t.effective : t.fta}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </Card>
                  }
                />
              )}
            </div>
          )}

          {mode === "fda_label" && <FDALabelGenerator products={allProducts} initialProduct={globalProductId} />}
          {mode === "landed" && <LandedCostCalc settings={settings} products={allProducts} initialProduct={globalProductId} initialCountry={globalCountryId} />}
          {mode === "docgen" && <DocGenerator settings={settings} products={allProducts} initialProduct={globalProductId} initialCountry={globalCountryId} />}
          {mode === "origin" && <OriginDetermination products={allProducts} initialProduct={globalProductId} />}
          {mode === "timeline" && <ComplianceTimeline initialCountry={globalCountryId} checked={timelineChecks} onCheckedChange={setTimelineChecks} />}

          {/* DOCS */}
          {mode === "docs" && (
            <div>
              <SectionHeader sub="仕向国別の必要書類とラベル要件">📋 必要書類一覧</SectionHeader>
              <CountryTabs selected={selectedCountry} onSelect={setSelectedCountry} />
              <TwoCol ratio="1fr 1fr"
                left={
                  <Card>
                    <Label>📄 書類</Label>
                    {selCountry?.docs?.map((d, i) => (
                      <div key={i} style={{ padding: "10px 14px", border: `1px solid ${C.border}`, borderRadius: "8px", background: C.white, marginBottom: "6px" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                          <span style={{ fontSize: "14px", fontWeight: 600 }}>{d.name}</span>
                          {d.required ? <Pill color={C.red} bg="#FFF5F5" border="#FED7D7">必須</Pill> : <Pill color={C.gray} bg={C.grayLight} border={C.border}>任意</Pill>}
                        </div>
                        {d.desc && <div style={{ fontSize: "12px", color: C.textLight, marginTop: "3px" }}>{d.desc}</div>}
                      </div>
                    ))}
                  </Card>
                }
                right={
                  <Card>
                    <Label>🏷️ ラベル表示要件</Label>
                    {selCountry?.labeling?.map((l, i) => (
                      <div key={i} style={{ padding: "10px 14px", border: `1px solid ${C.border}`, borderRadius: "8px", background: C.white, marginBottom: "6px" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                          <span style={{ fontSize: "14px", fontWeight: 600 }}>{l.item}</span>
                          {l.mandatory ? <Pill color={C.red} bg="#FFF5F5" border="#FED7D7">義務</Pill> : <Pill color={C.gray} bg={C.grayLight} border={C.border}>推奨</Pill>}
                        </div>
                        <div style={{ fontSize: "12px", color: C.textLight, marginTop: "3px" }}>{l.format}</div>
                      </div>
                    ))}
                  </Card>
                }
              />
            </div>
          )}

          {/* THRESHOLD */}
          {mode === "threshold" && (
            <div>
              <SectionHeader sub="成分比率によるHS番号変動をシミュレーション">⚖️ 分類閾値シミュレーター</SectionHeader>
              <div style={{ display: "flex", gap: "8px", marginBottom: "16px", flexWrap: "wrap" }}>
                {allProducts.filter((p) => p.thresholds?.length > 0).map((p) => (
                  <button key={p.id} onClick={() => { setThresholdProduct(p); setThresholdValues({}); }} style={{ padding: "8px 16px", border: thresholdProduct?.id === p.id ? `2px solid ${C.amber}` : `1px solid ${C.border}`, borderRadius: "8px", background: thresholdProduct?.id === p.id ? C.amberLight : C.white, cursor: "pointer", fontSize: "13px", fontWeight: thresholdProduct?.id === p.id ? 700 : 500 }}>{p.name}</button>
                ))}
              </div>
              <div style={{ maxWidth: "600px" }}>
                {thresholdProduct?.thresholds.map((th, i) => {
                  const val = thresholdValues[th.key];
                  const result = val !== undefined && val !== "" ? (parseFloat(val) < th.boundary ? th.below : th.above) : null;
                  return (
                    <Card key={i}>
                      <div style={{ fontSize: "14px", fontWeight: 700, marginBottom: "8px" }}>{th.param}</div>
                      <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                        <Input value={val ?? ""} onChange={(v) => setThresholdValues((tv) => ({ ...tv, [th.key]: v }))} type="number" placeholder={`境界: ${th.boundary}`} style={{ width: "160px" }} />
                        <span style={{ fontSize: "13px", color: C.textLight }}>境界値: {th.boundary}</span>
                      </div>
                      {result && <div style={{ marginTop: "8px", padding: "8px 14px", background: C.greenBg, border: `1px solid ${C.greenBorder}`, borderRadius: "6px", fontSize: "14px", fontWeight: 600, color: C.green }}>→ {result}</div>}
                      {th.note && <div style={{ fontSize: "12px", color: C.textMuted, marginTop: "6px" }}>{th.note}</div>}
                    </Card>
                  );
                })}
              </div>
            </div>
          )}

          {mode === "products" && <ProductManager customProducts={customProducts} onUpdate={setCustomProducts} apiKey={apiKey} />}
          {mode === "settings" && <SettingsPanel settings={settings} onUpdate={setSettings} apiKey={apiKey} onApiKeyChange={setApiKey} />}
          {mode === "guide" && <GuidePanel guideOpen={guideOpen} setGuideOpen={setGuideOpen} />}

        </div>
        {/* FOOTER */}
        <div style={{ padding: "16px 24px 28px", borderTop: `1px solid ${C.border}`, maxWidth: "960px" }}>
          <div style={{ fontSize: "11px", color: C.textMuted, lineHeight: 1.7 }}>
            本ツールは参考情報です。最終判断は各国税関当局・通関士に確認してください。<br />
            外部専門家が必要: ①米国Licensed Customs Broker（法的義務） ②FDA US Agent（法的義務）<br />
            © 2026 ORYZAE Inc. — Export Ops v3.0
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(ORYZAEExportTool), document.getElementById('root'));
</script>
</body>
</html>
